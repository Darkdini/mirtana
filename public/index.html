        <input id="al-tag" type="text" maxlength="4" placeholder="Тег [2–4 буквы]" style="width:100%;background:#0a1a0a;border:2px solid var(--gold3);color:#80ff80;padding:8px;border-radius:4px;font-family:inherit;font-size:13px;margin-bottom:8px;">
        <button id="al-create-btn" class="mbtn" style="width:100%;padding:9px;">Создать альянс</button>
      </div>
      <div style="font-size:13px;font-weight:bold;color:var(--gold2);margin-bottom:6px;">🌍 Все альянсы (${alliances.length})</div>
      <div style="max-height:200px;overflow-y:auto;">
        ${alliances.length?alliances.map(a=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px;background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;margin-bottom:4px;">
            <div>
              <span style="font-weight:bold;color:var(--gold2);">[${escH(a.tag)}] ${escH(a.name)}</span>
              <div style="font-size:11px;color:#a08060;">Лидер: ${escH(a.leader)} · ${a.memberCount} чел.</div>
            </div>
            <button class="mbtn gray join-btn" data-id="${a.id}" style="padding:4px 8px;font-size:10px;min-width:auto;">Вступить</button>
          </div>`).join('')
        :'<p style="text-align:center;color:#a08060;padding:12px;">Пока нет альянсов</p>'}
      </div>`;
    const bg=modal({title:'🛡 Альянс',body:con});
    bg.querySelectorAll('.join-btn').forEach(btn=>{
      btn.onclick=async()=>{
        try{await api('/api/alliance/join',{method:'POST',body:{allianceId:btn.dataset.id}});
          toast('Вы вступили в альянс!','ok');bg.remove();await refreshState();showAllianceModal();}
        catch(e){toast(e.message,'err');}
      };
    });
    bg.querySelector('#al-create-btn').onclick=async()=>{
      const name=bg.querySelector('#al-name').value.trim();
      const tag=bg.querySelector('#al-tag').value.trim();
      try{await api('/api/alliance/create',{method:'POST',body:{name,tag}});
        toast('Альянс создан!','ok');bg.remove();await refreshState();showAllianceModal();}
      catch(e){toast(e.message,'err');}
    };
    return;
  }
  // Есть альянс — показываем управление
  let fullAlliance=null;
  try{const r=await api('/api/alliance');fullAlliance=r.alliance;}catch{}
  const isLeader=fullAlliance?.leader===p.username;
  const membersHtml=fullAlliance?fullAlliance.members.map(m=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px;background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;margin-bottom:4px;">
      <div>
        <span style="font-weight:bold;color:var(--gold2);">${m.username===fullAlliance.leader?'👑 ':''} ${m.kingdom||m.username}</span>
        <div style="font-size:11px;color:#a08060;">@${m.username} · ${RACES[m.race]?.name||''}</div>
        <div style="font-size:10px;color:#c0a050;">⚔${fmtN(m.rating||0)} + ⭐${fmtN(m.reputation||0)} = <b style="color:#ffd44a;">${fmtN(m.power||0)}</b> силы</div>
      </div>
      ${isLeader&&m.username!==p.username?`<button class="mbtn red kick-btn" data-u="${m.username}" style="padding:3px 7px;font-size:10px;min-width:auto;">Исключить</button>`:''}
    </div>`).join(''):'<p style="color:#a08060;">Загрузка...</p>';
  const invHtml=isLeader?`
    <div style="margin-top:10px;border-top:1px solid var(--gold3);padding-top:10px;">
      <div style="font-size:12px;font-weight:bold;color:var(--gold2);margin-bottom:6px;">Пригласить игрока:</div>
      <div style="display:flex;gap:6px;">
        <input id="inv-name" type="text" placeholder="Имя игрока" style="flex:1;background:#0a1a0a;border:2px solid var(--gold3);color:#80ff80;padding:7px;border-radius:4px;font-family:inherit;font-size:12px;">
        <button id="inv-btn" class="mbtn gold" style="padding:7px 12px;font-size:11px;min-width:auto;">Пригласить</button>
      </div>
    </div>`:'';
  const tradeHtml=`
    <div style="margin-top:10px;border-top:1px solid var(--gold3);padding-top:10px;">
      <div style="font-size:12px;font-weight:bold;color:var(--gold2);margin-bottom:6px;">📦 Отправить ресурсы союзнику:</div>
      <select id="trade-to" style="width:100%;background:#0a1a0a;border:2px solid var(--gold3);color:#80ff80;padding:7px;border-radius:4px;font-family:inherit;font-size:12px;margin-bottom:6px;">
        ${(fullAlliance?.members||[]).filter(m=>m.username!==p.username).map(m=>`<option value="${m.username}">${m.kingdom||m.username}</option>`).join('')}
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px;">
        ${['gold','wood','stone','iron','food'].map(r=>`<div style="display:flex;gap:4px;align-items:center;">
          <span style="font-size:11px;color:#c0a070;width:42px;">${RES_L[r]}</span>
          <input type="number" class="trade-res" data-r="${r}" value="0" min="0" style="flex:1;background:#0a1a0a;border:1px solid var(--gold3);color:#80ff80;padding:4px;border-radius:3px;font-size:11px;text-align:center;">
        </div>`).join('')}
      </div>
      <button id="trade-btn" class="mbtn gold" style="width:100%;padding:8px;">Отправить</button>
    </div>`;
  const con2=document.createElement('div');
  con2.innerHTML=`
    <div style="background:linear-gradient(135deg,#1a1a2a,#0a0a1a);border:1px solid #4a5a7a;border-radius:6px;padding:10px;margin-bottom:10px;">
      <div style="font-size:16px;font-weight:bold;color:#7ad4ff;">[${alInfo.tag}] ${alInfo.name}</div>
      <div style="font-size:12px;color:#8a9aaa;margin-top:3px;">Лидер: ${alInfo.leader} · ${alInfo.memberCount} участников</div>
      <div style="font-size:12px;color:#ffd44a;margin-top:4px;">⚔ Сила альянса: <b>${fmtN(fullAlliance?.alliancePower||0)}</b></div>
    </div>
    <div style="font-size:12px;font-weight:bold;color:var(--gold2);margin-bottom:6px;">👥 Участники:</div>
    <div style="max-height:180px;overflow-y:auto;" id="members-list">${membersHtml}</div>
    ${invHtml}
    ${tradeHtml}`;
  // Войны альянсов
  const myWars = S.player.allianceWars || {};
  const myWarsList = Object.entries(myWars);
  const warHtml = isLeader ? `
    <div style="margin-top:10px;border-top:1px solid var(--gold3);padding-top:10px;">
      <div style="font-size:12px;font-weight:bold;color:#ff8060;margin-bottom:6px;">⚔ Войны альянса</div>
      ${myWarsList.length > 0 ? myWarsList.map(([wk, war]) => {
        const enemyId = war.attacker === p.allianceId ? war.defender : war.attacker;
        const enemyAlliance = worldAlliances[enemyId] || { tag: enemyId, name: enemyId };
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px;background:rgba(80,0,0,.3);border:1px solid #803030;border-radius:3px;margin-bottom:3px;">
          <span style="font-size:12px;color:#ff8080;">⚔ vs [${enemyAlliance.tag||enemyId}] ${enemyAlliance.name||''}</span>
          <button class="mbtn gray peace-btn" data-enemy="${enemyId}" style="padding:3px 8px;font-size:10px;min-width:auto;">🕊 Мир</button>
        </div>`;
      }).join('') : '<p style="font-size:11px;color:#a08060;">Войн нет</p>'}
      <div style="display:flex;gap:5px;margin-top:6px;">
        <input id="war-target" type="text" placeholder="ID альянса (из /alliances)" style="flex:1;background:#0a1a0a;border:2px solid #803030;color:#ff8080;padding:6px;border-radius:4px;font-family:inherit;font-size:11px;">
        <button id="war-declare-btn" class="mbtn red" style="padding:6px 10px;font-size:11px;min-width:auto;">Объявить войну</button>
      </div>
    </div>` : '';
  con2.innerHTML += warHtml;

  const actions2=[{label:'🚪 Выйти из альянса',kind:'red',handler:async()=>{
    if(!confirm('Выйти из альянса?'))return;
    try{await api('/api/alliance/leave',{method:'POST'});toast('Вы вышли из альянса','ok');await refreshState();}
    catch(e){toast(e.message,'err');}
  }}];
  const bg2=modal({title:`🛡 Альянс [${alInfo.tag}]`,body:con2,actions:actions2});
  // Kick buttons
  bg2.querySelectorAll('.kick-btn').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('Исключить '+btn.dataset.u+'?'))return;
      try{await api('/api/alliance/kick',{method:'POST',body:{target:btn.dataset.u}});
        toast('Исключён','ok');bg2.remove();showAllianceModal();}
      catch(e){toast(e.message,'err');}
    };
  });
  // Invite
  const invBtn=bg2.querySelector('#inv-btn');
  if(invBtn)invBtn.onclick=async()=>{
    const n=bg2.querySelector('#inv-name').value.trim();
    if(!n)return;
    try{await api('/api/alliance/invite',{method:'POST',body:{target:n}});toast('Приглашение отправлено!','ok');}
    catch(e){toast(e.message,'err');}
  };
  // War buttons
  bg2.querySelectorAll('.peace-btn').forEach(btn=>{
    btn.onclick=async()=>{
      const enemy=btn.dataset.enemy;
      if(!confirm(`Заключить мир с альянсом ${enemy}?`))return;
      try{await api('/api/alliance/peace',{method:'POST',body:{targetAlliance:enemy}});
        toast('Мир заключён!','ok');bg2.remove();showAllianceModal();}
      catch(e){toast(e.message,'err');}
    };
  });
  const warDeclareBtn=bg2.querySelector('#war-declare-btn');
  if(warDeclareBtn)warDeclareBtn.onclick=async()=>{
    const target=bg2.querySelector('#war-target')?.value.trim();
    if(!target)return;
    if(!confirm(`Объявить войну альянсу ${target}?`))return;
    try{await api('/api/alliance/declare-war',{method:'POST',body:{targetAlliance:target}});
      toast('⚔ Война объявлена!','ok');bg2.remove();showAllianceModal();}
    catch(e){toast(e.message,'err');}
  };

  // Trade
  bg2.querySelector('#trade-btn')?.addEventListener('click',async()=>{
    const to=bg2.querySelector('#trade-to')?.value;
    if(!to)return;
    const resources={};
    bg2.querySelectorAll('.trade-res').forEach(inp=>{const v=parseInt(inp.value)||0;if(v>0)resources[inp.dataset.r]=v;});
    if(!Object.keys(resources).length){toast('Укажите количество ресурсов','err');return;}
    try{await api('/api/trade',{method:'POST',body:{targetUsername:to,resources}});
      toast('Ресурсы отправлены!','ok');bg2.remove();await refreshState();}
    catch(e){toast(e.message,'err');}
  });
}


// ── АРТЕФАКТЫ ──────────────────────────────────────────
const ARTIFACTS = {
  sword_of_power:   {name:'Меч силы',          desc:'Атака +15%',                icon:'⚔'},
  shield_of_faith:  {name:'Щит веры',           desc:'Защита +15%',               icon:'🛡'},
  horn_of_plenty:   {name:'Рог изобилия',       desc:'Все ресурсы +10%',          icon:'🦌'},
  ring_of_speed:    {name:'Кольцо скорости',    desc:'Скорость войск +20%',       icon:'💍'},
  crown_of_loyalty: {name:'Корона лояльности',  desc:'Лояльность +20',            icon:'👑'},
  tome_of_magic:    {name:'Фолиант магии',       desc:'Маг.атака +20%',            icon:'📖'},
  builders_hammer:  {name:'Молот зодчего',       desc:'Строительство -20% времени',icon:'🔨'},
  crown_of_kings:   {name:'Корона Королей',      desc:'Все бонусы +10%',           icon:'💎', super:true},
};

function showArtifactsModal() {
  const p = S.player;
  const inv = p.artifacts || [];
  const active = p.activeArtifacts || [];
  const exp = p.expedition;
  const hasExp = (p.castle || []).some(c => c.bldId === 'expedition' && c.level > 0);
  const hasMagt = (p.castle || []).some(c => c.bldId === 'magtower' && c.level > 0);
  const con = document.createElement('div');

  // Экспедиция
  const expNow = Date.now();
  const expDone = exp ? (exp.startedAt + exp.duration) : 0;
  const expActive = exp && expDone > expNow;
  const expRem = expActive ? Math.ceil((expDone - expNow) / 1000) : 0;
  let expHtml = '';
  if (hasExp) {
    if (expActive) {
      expHtml = `<div style="background:rgba(60,40,0,.5);border:1px solid var(--gold3);border-radius:5px;padding:8px;margin-bottom:10px;">
        <div style="font-size:12px;color:var(--gold2);font-weight:bold;margin-bottom:4px;">🗺 Экспедиция в пути...</div>
        <div style="color:#c0a060;font-size:12px;" id="exp-timer">⌛ ${fmtT(expRem)}</div>
      </div>`;
    } else {
      expHtml = `<div style="margin-bottom:10px;">
        <button class="mbtn gold" id="exp-start-btn" style="width:100%;padding:9px;font-size:12px;">
          🗺 Запустить экспедицию (500 🪙)
        </button>
        <div style="font-size:10px;color:#a08060;margin-top:4px;text-align:center;">10 мин · Шанс найти артефакт 60%</div>
      </div>`;
    }
  }

  // Вкладки
  con.innerHTML = `${expHtml}
  <div style="display:flex;gap:4px;margin-bottom:10px;">
    <button class="mbtn art-tab" data-tab="inv" style="flex:1;padding:7px;font-size:11px;${hasMagt?'':'opacity:.5'}">📦 Инвентарь (${inv.length})</button>
    <button class="mbtn gray art-tab" data-tab="active" style="flex:1;padding:7px;font-size:11px;">✨ Активные (${active.length}/5)</button>
  </div>
  <div id="art-inv-tab">
    ${inv.length ? inv.map((artId, i) => {
      const art = ARTIFACTS[artId] || {name: artId, desc: '', icon: '?'};
      const canActivate = hasMagt && active.length < 5;
      return `<div style="display:flex;gap:8px;align-items:center;background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;padding:8px;margin-bottom:4px;">
        <span style="font-size:24px;flex-shrink:0;">${art.icon || '✨'}</span>
        <div style="flex:1;">
          <div style="font-weight:bold;color:var(--gold2);font-size:13px;">${art.name}</div>
          <div style="font-size:11px;color:#a09060;">${art.desc}</div>
        </div>
        <button class="mbtn${canActivate ? ' gold' : ' gray'} act-btn" data-idx="${i}" style="padding:5px 8px;font-size:10px;min-width:auto;"${canActivate ? '' : ' disabled'}>
          ${canActivate ? 'Активировать' : (!hasMagt ? 'Нет башни' : 'Макс.5')}
        </button>
      </div>`;
    }).join('') : '<p style="text-align:center;color:#a08060;padding:12px;">Инвентарь пуст. Запускайте экспедиции!</p>'}
  </div>
  <div id="art-active-tab" style="display:none;">
    ${active.length ? active.map((artId, i) => {
      const art = ARTIFACTS[artId] || {name: artId, desc: '', icon: '?'};
      return `<div style="display:flex;gap:8px;align-items:center;background:rgba(20,40,0,.5);border:1px solid #5cff7a;border-radius:4px;padding:8px;margin-bottom:4px;">
        <span style="font-size:24px;flex-shrink:0;">${art.icon || '✨'}</span>
        <div style="flex:1;">
          <div style="font-weight:bold;color:#5cff7a;font-size:13px;">${art.name}</div>
          <div style="font-size:11px;color:#a09060;">${art.desc}</div>
        </div>
        <button class="mbtn gray deact-btn" data-idx="${i}" style="padding:5px 8px;font-size:10px;min-width:auto;">Убрать</button>
      </div>`;
    }).join('') : '<p style="text-align:center;color:#a08060;padding:12px;">Нет активных артефактов.</p>'}
    ${active.length >= 5 ? `<button class="mbtn gold" id="craft-super-btn" style="width:100%;padding:9px;margin-top:6px;font-size:12px;">
      💎 Скрафтить Корону Королей (из 5 активных)
    </button>` : ''}
  </div>`;

  const bg = modal({ title: '✨ Артефакты', body: con });

  // Вкладки
  bg.querySelectorAll('.art-tab').forEach(btn => {
    btn.onclick = () => {
      const tab = btn.dataset.tab;
      bg.querySelectorAll('.art-tab').forEach(b => b.className = b === btn ? 'mbtn art-tab' : 'mbtn gray art-tab');
      bg.querySelector('#art-inv-tab').style.display = tab === 'inv' ? 'block' : 'none';
      bg.querySelector('#art-active-tab').style.display = tab === 'active' ? 'block' : 'none';
    };
  });

  // Экспедиция
  const expBtn = bg.querySelector('#exp-start-btn');
  if (expBtn) expBtn.onclick = async () => {
    try {
      await api('/api/expedition/start', { method: 'POST', body: {} });
      toast('Экспедиция запущена!', 'ok');
      bg.remove();
      await refreshState();
    } catch(e) { toast(e.message, 'err'); }
  };

  // Активировать
  bg.querySelectorAll('.act-btn').forEach(btn => {
    btn.onclick = async () => {
      const idx = parseInt(btn.dataset.idx);
      try {
        const r = await api('/api/artifact/activate', { method: 'POST', body: { idx } });
        toast(`${r.name} активирован!`, 'ok');
        bg.remove();
        await refreshState();
        showArtifactsModal();
      } catch(e) { toast(e.message, 'err'); }
    };
  });

  // Деактивировать
  bg.querySelectorAll('.deact-btn').forEach(btn => {
    btn.onclick = async () => {
      const idx = parseInt(btn.dataset.idx);
      try {
        const r = await api('/api/artifact/deactivate', { method: 'POST', body: { idx } });
        toast(`${r.name} деактивирован`, 'ok');
        bg.remove();
        await refreshState();
        showArtifactsModal();
      } catch(e) { toast(e.message, 'err'); }
    };
  });

  // Крафт
  const craftBtn = bg.querySelector('#craft-super-btn');
  if (craftBtn) craftBtn.onclick = async () => {
    if (!confirm('Скрафтить Корону Королей? Все 5 активных артефактов будут потрачены!')) return;
    try {
      const r = await api('/api/artifact/craft-super', { method: 'POST', body: {} });
      toast(`${r.name} скована! Величайший артефакт!`, 'ok');
      bg.remove();
      await refreshState();
    } catch(e) { toast(e.message, 'err'); }
  };

  // Таймер экспедиции
  if (expActive) {
    const timerEl = bg.querySelector('#exp-timer');
    if (timerEl) {
      const timerInterval = setInterval(() => {
        const rem = Math.ceil((expDone - Date.now()) / 1000);
        if (rem <= 0) { clearInterval(timerInterval); timerEl.textContent = '✓ Готово!'; return; }
        timerEl.textContent = '⌛ ' + fmtT(rem);
      }, 1000);
      bg.querySelector('.xb').addEventListener('click', () => clearInterval(timerInterval));
    }
  }
}

// ── ШПИОНАЖ ────────────────────────────────────────────
function showSpyModal(targetUsername) {
  const p = S.player;
  const residentCell = (p.castle||[]).find(c=>c.bldId==='resident'&&c.level>0);
  const residentLvl = residentCell ? residentCell.level : 0;
  const chance = Math.min(85, 40 + residentLvl * 5);
  const cooldownRem = (p.spyCooldown||0) > Date.now() ? Math.ceil(((p.spyCooldown||0) - Date.now()) / 60000) : 0;

  const con = document.createElement('div');
  con.innerHTML = `
    <p style="text-align:center;color:#a08060;margin-bottom:8px;">Цель: <b style="color:var(--gold2);">${escH(targetUsername)}</b></p>
    <p style="text-align:center;font-size:11px;color:#c0a060;margin-bottom:10px;">
      Шпионаж ур.${residentLvl} · Шанс успеха: <b style="color:#5cff7a;">${chance}%</b>
      · Стоимость: 200🪙 + 50⚙
    </p>
    ${cooldownRem > 0 ? `<p style="text-align:center;color:#ff8080;">⏳ Перезарядка: ${cooldownRem} мин.</p>` : ''}
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="background:rgba(0,0,0,.4);border:1px solid var(--gold3);border-radius:5px;padding:10px;">
        <div style="font-weight:bold;color:#ffd44a;margin-bottom:4px;">💰 Кража ресурсов</div>
        <div style="font-size:11px;color:#a09060;">Крадёт 5–15% ресурсов у цели</div>
        <button class="mbtn gold spy-btn" data-action="steal" style="width:100%;margin-top:6px;padding:7px;font-size:11px;" ${cooldownRem>0?'disabled':''}>Украсть</button>
      </div>
      <div style="background:rgba(0,0,0,.4);border:1px solid var(--gold3);border-radius:5px;padding:10px;">
        <div style="font-weight:bold;color:#ff9060;margin-bottom:4px;">🔥 Диверсия</div>
        <div style="font-size:11px;color:#a09060;">40% шанс понизить уровень здания у цели на 1</div>
        <button class="mbtn spy-btn" data-action="sabotage" style="width:100%;margin-top:6px;padding:7px;font-size:11px;background:linear-gradient(180deg,#c07030,#803010);border-color:#e09050;" ${cooldownRem>0?'disabled':''}>Диверсия</button>
      </div>
      <div style="background:rgba(0,0,0,.4);border:1px solid var(--gold3);border-radius:5px;padding:10px;">
        <div style="font-weight:bold;color:#ff6060;margin-bottom:4px;">🗡 Убийство</div>
        <div style="font-size:11px;color:#a09060;">30%+ шанс уничтожить 5–10% армии цели</div>

function showAdvisorModal(){
  const p=S.player;
  if(!p)return;
  const res=p.res||{}, resMax=p.resMax||{}, queue=p.queue||[], trainQ=p.trainQueue||[];
  const castle=p.castle||[], lands=p.lands||[];
  const castleLvl=getCLvl();
  const allCells=[...castle,...lands];
  const techs=p.techs||{}, quests=p.quests||{};
  const army=armyTotal();

  const tips=[];
  const tip=(priority,icon,title,desc,fn,lbl)=>tips.push({priority,icon,title,desc,fn,lbl});

  // ── ЗАДАНИЯ: можно забрать награду ──
  const claimable=Object.entries(QUESTS_CLIENT).filter(([id])=>{
    const q=quests[id]; return q?.done&&!q?.claimed;
  });
  if(claimable.length)
    tip(10,'📜',`Заберите награду! (${claimable.length} задан${claimable.length===1?'ие':'ия'})`,
      claimable.map(([,q])=>q.name).join(', '),showQuestsModal,'Задания');

  // ── ЕДА критически мала ──
  if((res.food||0)<50)
    tip(9,'🌾','Критически мало еды!',
      `Осталось ${res.food||0} — войска могут взбунтоваться. Стройте или улучшайте фермы.`,
      ()=>setLoc('lands'),'Земли');
  else if((res.food||0)<200)
    tip(7,'🌾','Мало еды',`Запасы еды: ${res.food||0}. Рекомендуем улучшить фермы.`,
      ()=>setLoc('lands'),'Земли');

  // ── АРМИЯ ──
  if(army===0)
    tip(9,'⚔','Нет армии!',
      'Без войск вы беззащитны. Постройте казарму и наймите солдат.',
      showArmyModal,'Армия');
  else if(army<30)
    tip(7,'⚔',`Армия очень мала (${army} воинов)`,
      'Противники могут атаковать. Рекомендуем набрать хотя бы 50 воинов.',
      showArmyModal,'Армия');

  // ── ОЧЕРЕДЬ СТРОИТЕЛЬСТВА ПУСТА ──
  if(queue.length===0){
    // Найдём что можно построить/улучшить
    const upgradeable=castle.filter(c=>{
      if(!c.bldId)return false;
      const def=BUILDINGS[c.bldId]; if(!def)return false;
      if(c.level>=(def.max||20))return false;
      const cost=calcCost(c.bldId,c.level+1,castleLvl);
      return canAfford(cost)&&reqOk(c.bldId,allCells);
    }).slice(0,3);
    const buildable=Object.keys(BUILDINGS).filter(id=>{
      if(hasU(id))return false;
      if(!reqOk(id,allCells))return false;
      if(!BUILDINGS[id].unique)return false;
      const cost=calcCost(id,1,castleLvl);
      return canAfford(cost);
    }).slice(0,2);
    const names=[
      ...upgradeable.map(c=>`↑${BUILDINGS[c.bldId]?.name}`),
      ...buildable.map(id=>BUILDINGS[id]?.name)
    ].join(', ');
    if(names)
      tip(8,'🏗','Очередь строительства пуста',
        `Доступно: ${names||'проверьте замок'}`,()=>setLoc('castle'),'Замок');
    else
      tip(5,'🏗','Очередь строительства пуста',
        'Загляните в замок — возможно накоплено достаточно ресурсов.',
        ()=>setLoc('castle'),'Замок');
  }

  // ── РЕСУРСЫ ПЕРЕПОЛНЯЮТСЯ ──
  const resNames={food:'Еда',wood:'Дерево',stone:'Камень',iron:'Железо'};
  for(const[k,name] of Object.entries(resNames)){
    const val=res[k]||0, max=resMax[k]||1000;
    if(max>0&&val/max>0.9)
      tip(6,'📦',`${name} переполняется (${Math.round(val/max*100)}%)`,
        'Постройте или улучшите склад, либо потратьте ресурсы на строительство.',
        showResModal,'Казна');
  }

  // ── ТЕХНОЛОГИИ ──
  const affordableTechs=Object.entries(TECHS).filter(([tid,t])=>{
    if(techs[tid])return false;
    return canAfford(t.cost)&&reqOk(tid,allCells);
  });
  if(affordableTechs.length)
    tip(5,'🔬',`Доступно технологий для изучения: ${affordableTechs.length}`,
      affordableTechs.slice(0,3).map(([,t])=>t.name).join(', ')+(affordableTechs.length>3?'…':''),
      showTechModal,'Технологии');

  // ── АЛЬЯНС ──
  if(!p.alliance)
    tip(4,'🤝','Вы не в альянсе',
      'Союзники защитят вас и помогут в войнах. Создайте или вступите в альянс.',
      showAllianceModal,'Альянс');

  // ── ЗАДАНИЯ В ПРОГРЕССЕ ──
  const inProgress=Object.entries(QUESTS_CLIENT).filter(([id,q])=>{
    const s=quests[id]; return !s?.claimed&&!s?.done&&(s?.progress||0)>0;
  }).sort(([ia,qa],[ib,qb])=>{
    const pa=(quests[ia]?.progress||0)/qa.goal.count;
    const pb=(quests[ib]?.progress||0)/qb.goal.count;
    return pb-pa;
  });
  if(inProgress.length){
    const[cid,cdef]=inProgress[0], cq=quests[cid];
    const pct=Math.round((cq?.progress||0)/cdef.goal.count*100);
    tip(3,'📋',`Задание «${cdef.name}» — ${pct}%`,
      cdef.desc,showQuestsModal,'Задания');
  }

  // ── ЗЕМЛИ: пустые клетки ──
  const emptyLands=lands.filter(c=>!c.bldId&&c.type!=='wall'&&c.type!=='empty');
  if(emptyLands.length)
    tip(4,'🌍',`На землях ${emptyLands.length} пустых клеток`,
      'Постройте фермы, лесопилки или рудники для добычи ресурсов.',
      ()=>setLoc('lands'),'Земли');

  // ── РЕПУТАЦИЯ ──
  if((p.reputation||0)<10)
    tip(2,'⭐','Репутация очень низкая',
      'Тратьте золото на развитие или подарите репутацию — это влияет на силу в альянсе.',
      ()=>showRepGiftModal(''),'Репутация');

  tips.sort((a,b)=>b.priority-a.priority);

  // Случайная мудрость короля
  const wisdom=[
    '«Великие королевства строятся камень за камнем.»',
    '«Сильная армия — это мир без войны.»',
    '«Мудрый правитель слушает советника.»',
    '«Пустые склады — слабые стены.»',
    '«Союзники важнее золота.»',
    '«Технологии решают исход войны.»',
  ];
  const quote=wisdom[Math.floor(Date.now()/86400000)%wisdom.length];

  const con=document.createElement('div');
  con.innerHTML=`<div style="background:linear-gradient(135deg,rgba(200,160,40,.15),rgba(200,160,40,.05));border:1px solid rgba(160,120,40,.4);border-radius:10px;padding:10px 12px;margin-bottom:10px;text-align:center;">
    <div style="font-size:11px;color:#9a7030;font-style:italic;">${quote}</div>
  </div>`+
  (tips.length===0
    ? '<p style="text-align:center;padding:16px;color:#6a5030;font-size:13px;">👑 Ваше королевство процветает!<br>Нет срочных советов.</p>'
    : '<div style="display:flex;flex-direction:column;gap:7px;">'+
      tips.map((t,i)=>`
        <div data-ti="${i}" style="background:rgba(255,255,255,.5);border-radius:10px;
          border:1px solid rgba(${t.priority>=8?'200,80,40':'160,120,40'},.4);
          padding:10px 12px;display:flex;gap:10px;align-items:flex-start;
          cursor:${t.fn?'pointer':'default'};">
          <span style="font-size:22px;flex-shrink:0;">${t.icon}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:bold;color:#3a1a08;margin-bottom:2px;">${t.title}</div>
            <div style="font-size:11px;color:#7a4a20;line-height:1.4;">${t.desc}</div>
          </div>
          ${t.fn?'<span style="color:#9a7020;font-size:18px;align-self:center;flex-shrink:0;">›</span>':''}
        </div>`).join('')+'</div>');

  const bg=modal({title:'🧙 Советник',body:con});
  tips.forEach((t,i)=>{
    if(!t.fn)return;
    con.querySelector(`[data-ti="${i}"]`)?.addEventListener('click',()=>{bg.remove();t.fn();});
  });
}

function showQuestsModal() {

  const con = document.createElement('div');
  con.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;">' +
    Object.entries(QUESTS_CLIENT).map(([qid, qdef]) => {
      const q = quests[qid] || { progress: 0, done: false, claimed: false };

            <div style="font-size:11px;color:#5cff7a;margin-top:2px;">🎁 ${rewardStr}</div>
          </div>
          <div style="flex-shrink:0;margin-left:8px;">${btnHtml}</div>
        </div>
        <div style="height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;">

        bg.remove();
        await refreshState();
        showQuestsModal();

  });

        border:2px solid ${isActive?'#f0c958':'#7a5a20'};
        border-radius:8px;padding:10px;margin-bottom:8px;position:relative;">
        ${isActive?'<div style="position:absolute;top:5px;right:8px;font-size:10px;color:#f0c958;">★ АКТИВЕН</div>':''}
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div style="flex-shrink:0;width:52px;height:52px;border:2px solid #f0c958;border-radius:6px;
            background:#1a1008;display:flex;align-items:center;justify-content:center;overflow:hidden;">
            ${img?`<img src="${img}" width="48" height="48" style="image-rendering:pixelated;object-fit:contain;">`:'<span style="font-size:28px;">⚔</span>'}
          </div>
          <div style="flex:1;min-width:0;">
            <div class="gen-name-display" style="font-size:14px;font-weight:bold;color:#f0c958;">${cname}</div>
            <div style="font-size:10px;color:#a08040;margin-top:1px;">Ур.${lvl} · ⚔${u?.atk} 🛡${u?.def} · HP${u?.hp}</div>
            <div style="font-size:10px;color:#806030;margin-top:3px;">XP: ${xp}/${xpNext}</div>
            <div style="height:4px;background:rgba(0,0,0,.5);border-radius:2px;margin-top:3px;overflow:hidden;">
              <div style="height:100%;width:${xpPct}%;background:linear-gradient(90deg,#c07010,#f0c040);border-radius:2px;transition:width .3s;"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:5px;margin-top:8px;">
          <button class="mbtn${isActive?' gold':' gray'} gen-activate" data-uid="${uid}"
            style="flex:1;padding:5px;font-size:10px;">${isActive?'✓ Командует':'Назначить'}</button>
          <button class="mbtn gray gen-rename-btn" data-uid="${uid}"
            style="padding:5px 10px;font-size:10px;">✏ Имя</button>
        </div>
        <div class="gen-rename-box" data-uid="${uid}" style="display:none;margin-top:6px;">
          <div style="display:flex;gap:4px;">
            <input class="gen-rename-inp" data-uid="${uid}" type="text" value="${cname}" maxlength="24"
              style="flex:1;background:#0a0805;border:1px solid #7a5020;color:#f0d080;
              padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;">
            <button class="mbtn gold gen-rename-save" data-uid="${uid}"
              style="padding:5px 10px;font-size:11px;">✓</button>
          </div>
        </div>
      </div>`;
    }
    generalsHtml += '</div>';
  }

  // ── Павшие генералы ─────────────────────────────────────────────
  let deadHtml = '';
  if (dead.length) {
    deadHtml = `<div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#c06060;font-weight:bold;letter-spacing:2px;margin-bottom:6px;">⚰ ПАВШИЕ ГЕНЕРАЛЫ</div>`;
    dead.forEach((g, i) => {
      const u = UNITS[g.uid];
      const cname = genName(g.uid);
      const canAffordRes = (p.res.gold||0) >= g.resurrectCost;
      deadHtml += `
      <div style="display:flex;gap:8px;align-items:center;
        background:linear-gradient(135deg,rgba(60,5,5,.7),rgba(20,0,0,.8));
        border:1px solid #6a2020;border-radius:8px;padding:9px;margin-bottom:6px;">
        <div style="width:42px;height:42px;border:1px solid #6a2020;border-radius:5px;
          background:#1a0808;display:flex;align-items:center;justify-content:center;
          filter:grayscale(1);opacity:.6;overflow:hidden;flex-shrink:0;">
          ${u?.img?`<img src="${u.img}" width="38" height="38" style="image-rendering:pixelated;">`:'<span style="font-size:22px;">⚰</span>'}
        </div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:bold;color:#c08080;">${cname}</div>
          <div style="font-size:11px;color:#a06060;margin-top:2px;">Воскрешение: <b style="color:#ffd060;">🪙 ${g.resurrectCost}</b></div>
        </div>
        <button class="mbtn${canAffordRes&&hasHQ?' gold':' gray'} res-gen" data-idx="${i}"
          style="font-size:11px;padding:6px 10px;">${hasHQ?'Воскресить':'Нет штаба'}</button>
      </div>`;
    });
    deadHtml += '</div>';
  }

  // ── Обычные войска ──────────────────────────────────────────────
  const regularUnits = Object.entries(army).filter(([uid,n])=>n>0&&!uid.endsWith('_general'));
  let unitsHtml = '';
  if (regularUnits.length) {
    unitsHtml = `<div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#c0a060;font-weight:bold;letter-spacing:2px;margin-bottom:6px;">⚔ ВОЙСКА</div>
      <div style="display:flex;flex-direction:column;gap:3px;">`;
    for (const [uid,n] of regularUnits) {
      const u = UNITS[uid];
      unitsHtml += `<div style="display:flex;gap:7px;align-items:center;
        background:rgba(0,0,0,.3);border:1px solid #4a3018;border-radius:4px;padding:5px 8px;">
        ${u?.simg?`<img src="${u.simg}" width="20" height="20" style="image-rendering:pixelated;">`:'<span>⚔</span>'}
        <span style="flex:1;font-size:12px;color:#d0b080;">${u?.name||uid}</span>
        <span style="font-size:12px;color:#f0d060;">×${n}</span>
        <span style="font-size:11px;color:#808060;">Сила ${n*(u?.atk||0)}</span>
      </div>`;
    }
    unitsHtml += '</div></div>';
  }

  // ── Разведка ────────────────────────────────────────────────────
  const scoutUnits = Object.entries(army).filter(([uid,n])=>uid.includes('scout')&&n>0);
  const scoutHtml = scoutUnits.length ? `
    <button class="mbtn gray" id="scout-btn" style="width:100%;padding:8px;font-size:12px;margin-bottom:8px;">🔭 Отправить разведку</button>` : '';

  const bd = `
    <div style="display:flex;justify-content:space-between;align-items:center;
      background:rgba(0,0,0,.3);border:1px solid #7a5020;border-radius:6px;
      padding:8px 12px;margin-bottom:12px;">
      <div style="font-size:13px;color:#d4a236;font-weight:bold;">⚔ Штаб ур.${cell.level}</div>
      <div style="font-size:12px;color:#5cff7a;">Сила: <b>${totalPower}</b></div>
    </div>
    ${scoutHtml}${generalsHtml}${deadHtml}${unitsHtml}
    ${!myGenerals.length&&!dead.length?'<p style="text-align:center;color:#806040;padding:8px;font-size:12px;">Генералов нет. Обучите в казарме.</p>':''}`;

  // Дополнительные действия — улучшение здания
  const clvl = getCLvl();
  const def = BUILDINGS['military_hq'];
  const cost = calcCost('military_hq', cell.level);
  const timeS = calcTime('military_hq', cell.level, clvl);
  const ok = canAfford(cost);
  const upgradeSection = `
    <div style="background:rgba(0,0,0,.3);padding:8px;border-radius:4px;border:1px dashed var(--gold3);margin-top:8px;">
      <b style="color:var(--gold2);">Улучшить → ур.${cell.level + 1}</b><br>
      ${costHtml(cost)}<br><span style="color:var(--gold);">⌛ ${fmtT(timeS)}</span>
    </div>`;

  const bg = modal({
    title: '⚔ Военный штаб',
    body: bd + upgradeSection,
    actions: [
      {
        label: `Улучшить (+${ratingDeltaClient('military_hq', cell.level + 1)}⭐)`,
        disabled: !ok,
        handler: async () => {
          try {
            await api('/api/build', { method: 'POST', body: { loc: 'castle', col: cell.col, row: cell.row, bldId: 'military_hq' } });
            toast('Начато улучшение!', 'ok');
            await refreshState();
          } catch(e) { toast(e.message, 'err'); }
        },
      },
      {
        label: 'Снести',
        kind: 'red',
        handler: async (mbg) => {
          if (!confirm('Снести Военный штаб?')) return;
          try {
            await api('/api/demolish', { method: 'POST', body: { loc: 'castle', col: cell.col, row: cell.row } });
            toast('Снесено');
            mbg.remove();
            await refreshState();
          } catch(e) { toast(e.message, 'err'); }
        },
        close: false,
      },
    ],
  });

  // Воскрешение генералов
  bg.querySelectorAll('.res-gen').forEach(btn => {
    btn.onclick = async () => {
      const idx = parseInt(btn.dataset.idx);
      try {
        const r = await api('/api/resurrect', { method: 'POST', body: { idx } });
        toast(`✅ ${r.name} воскрешён!`, 'ok');
        bg.remove(); await refreshState();
      } catch(e) { toast(e.message, 'err'); }
    };
  });

  // Назначить активного генерала
  bg.querySelectorAll('.gen-activate').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const cur = localStorage.getItem('activeGeneral');
      if (cur === uid) {
        localStorage.removeItem('activeGeneral');
        toast('Генерал снят с командования', 'ok');
      } else {
        localStorage.setItem('activeGeneral', uid);
        toast(`${(p.generalNames||{})[uid]||UNITS[uid]?.name||uid} назначен командующим!`, 'ok');
      }
      bg.remove(); showMilitaryHQModal(cell);
    };
  });

  // Кнопка "Переименовать" — показать/скрыть поле ввода
  bg.querySelectorAll('.gen-rename-btn').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const box = bg.querySelector(`.gen-rename-box[data-uid="${uid}"]`);
      if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
    };
  });

  // Сохранить новое имя
  bg.querySelectorAll('.gen-rename-save').forEach(btn => {
    btn.onclick = async () => {
      const uid = btn.dataset.uid;
      const inp = bg.querySelector(`.gen-rename-inp[data-uid="${uid}"]`);
      const name = inp?.value?.trim();
      if (!name) return toast('Введи имя', 'err');
      try {
        await api('/api/rename-general', { method: 'POST', body: { uid, name } });
        toast(`Имя изменено: ${name}`, 'ok');
        bg.remove(); await refreshState(); showMilitaryHQModal(cell);
      } catch(e) { toast(e.message, 'err'); }
    };
  });

  // Разведка
  const scoutBtn = bg.querySelector('#scout-btn');
  if (scoutBtn) { scoutBtn.onclick = () => { bg.remove(); showScoutModal(); }; }
}

function showScoutModal() {
  const p = S.player;
  const scoutUnits = Object.entries(p.army || {}).filter(([uid, n]) => uid.includes('scout') && n > 0);
  const con = document.createElement('div');
  con.innerHTML = `
    <p style="text-align:center;color:#a08060;margin-bottom:8px;">Выберите цель для разведки (только scout-юниты)</p>
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <input type="number" id="scout-col" placeholder="Колонка" min="0" max="19"
        style="flex:1;padding:6px;background:#0a1a0a;border:2px solid var(--gold3);color:#80ff80;border-radius:4px;font-family:inherit;font-size:12px;text-align:center;">
      <input type="number" id="scout-row" placeholder="Строка" min="0" max="19"
        style="flex:1;padding:6px;background:#0a1a0a;border:2px solid var(--gold3);color:#80ff80;border-radius:4px;font-family:inherit;font-size:12px;text-align:center;">
    </div>
    <div style="font-size:12px;color:var(--gold2);margin-bottom:6px;">Scout-юниты:</div>
    ${scoutUnits.map(([uid, have]) => {
      const u = UNITS[uid];
      return `<div style="display:flex;gap:7px;align-items:center;padding:5px;background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;margin-bottom:4px;">
        <div style="flex:1;font-size:12px;"><b style="color:var(--gold2);">${u?.name || uid} (${have})</b></div>
        <input type="number" class="sc" data-uid="${uid}" value="${Math.min(have, 3)}" min="1" max="${have}"
          style="width:50px;padding:4px;background:#0a1a0a;border:2px solid var(--gold);color:#70ff70;border-radius:4px;font-family:inherit;font-size:12px;text-align:center;">
      </div>`;
    }).join('')}`;
  const bg = modal({ title: '🔭 Разведка', body: con, actions: [
    { label: 'Разведать', kind: 'gold', handler: async () => {
      const col = parseInt(bg.querySelector('#scout-col').value);
      const row = parseInt(bg.querySelector('#scout-row').value);
      if (isNaN(col) || isNaN(row)) { toast('Укажите координаты', 'err'); return; }
      const units = {};
      bg.querySelectorAll('.sc').forEach(inp => {
        const n = Math.max(1, parseInt(inp.value) || 1);
        if (n > 0) units[inp.dataset.uid] = n;
      });
      try {
        await api('/api/scout', { method: 'POST', body: { targetCol: col, targetRow: row, units } });
        toast('Разведчики отправлены!', 'ok');
        await refreshState();
      } catch(e) { toast(e.message, 'err'); }
    }, close: true },
  ]});
}

// ── АВТОЛОГИН
(async()=>{
  initAuth();
  try{S=await api('/api/state');await enterGame();}catch(e){}
})();
</script>
</body>
</html>
