<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>СРЕДНЕВЕКОВЬЕ</title>
<style>
:root{
  --gold:#e0a83a;--gold2:#f5d060;--gold3:#9a6e22;
  --dark:#0c0704;--wood:#3e2010;--wood2:#5e3218;
  --red:#5a0e0e;--red2:#3a0a0a;
  --green:#2d6b3a;--green2:#1d4a26;
  --hex-grass:#4a7a28;--hex-forest:#2a5a18;--hex-stone:#6a6860;
  --amber:#c87820;--honey:#f0b030;--copper:#b06820;
  --warm-panel:rgba(255,160,40,.05);
  --warm-glow:rgba(220,130,30,.18);
  --warm-shadow:rgba(180,90,10,.55);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Times New Roman',serif;
  background:var(--dark);color:#fff;user-select:none;-webkit-user-select:none;}
button{font-family:inherit;background:none;border:0;color:inherit;cursor:pointer;}

/* ===== AUTH ===== */
@keyframes titleGlow{
  0%,100%{filter:drop-shadow(0 2px 12px rgba(230,145,0,.65));}
  50%{filter:drop-shadow(0 2px 26px rgba(255,190,50,1));}
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
#auth{
  position:fixed;inset:0;
  background:url('auth_bg.png') center center/cover no-repeat;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 16px;overflow-y:auto;z-index:200;
}
#auth::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 130% 85% at 50% 115%, rgba(66,25,10,.7) 0%, rgba(30,11,3,.55) 48%, rgba(9,4,2,.4) 100%);
}
#auth-embers{position:fixed;inset:0;pointer-events:none;z-index:1;}
/* Кнопка языка */
#lang-btn{
  position:fixed;top:12px;right:14px;z-index:210;
  background:rgba(38,18,5,.88);border:1px solid #8a5a22;
  color:#e0a83a;font-size:12px;font-weight:bold;
  padding:5px 10px;border-radius:20px;cursor:pointer;
  letter-spacing:1px;backdrop-filter:blur(4px);
  transition:border-color .2s,color .2s,box-shadow .2s;
}
#lang-btn:hover{border-color:#e0a83a;color:#f5d060;box-shadow:0 0 8px rgba(220,140,30,.3);}
/* Лого */
.auth-logo{text-align:center;position:relative;z-index:2;margin-bottom:6px;}
.auth-logo .t1{
  display:block;font-size:clamp(26px,8vw,52px);
  background:linear-gradient(180deg,#fff8b0 0%,#f5c838 32%,#c87820 68%,#6e3200 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-weight:900;font-variant:small-caps;letter-spacing:5px;
  animation:titleGlow 3s ease-in-out infinite;
}
.auth-logo .t2{
  display:block;font-size:11px;color:#aa7832;letter-spacing:6px;
  text-transform:uppercase;margin-top:4px;
}
/* Карточка */
.parch{
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, var(--warm-panel) 0%, transparent 70%),
    linear-gradient(160deg,rgba(255,190,70,.06) 0%,transparent 45%),
    linear-gradient(180deg,#3e2412 0%,#251408 60%,#1a0d05 100%);
  border:1px solid #724418;border-radius:18px;
  padding:0;max-width:340px;width:100%;
  position:relative;z-index:2;
  box-shadow:
    0 0 0 1px #1e0e04,
    0 28px 64px rgba(0,0,0,.88),
    0 0 48px var(--warm-glow),
    inset 0 1px 0 rgba(255,185,60,.08);
  animation:cardIn .35s ease;
  overflow:hidden;
}
/* Вкладки логин/регистрация */
.auth-tabs{display:flex;border-bottom:1px solid #522c10;}
.auth-tab{
  flex:1;padding:12px;text-align:center;font-size:12px;font-weight:bold;
  letter-spacing:2px;text-transform:uppercase;color:#7e5232;cursor:pointer;
  transition:color .2s,background .2s;
}
.auth-tab.active{color:#f5c838;background:rgba(255,160,40,.07);border-bottom:2px solid #e0a83a;}
.auth-tab:hover:not(.active){color:#c89850;}
/* Тело карточки */
.auth-body{padding:20px 18px 18px;}
.parch h3{
  font-size:9px;color:#aa7832;margin:12px 0 5px;
  text-transform:uppercase;letter-spacing:3px;
}
.parch h3:first-child{margin-top:0;}
/* Поля ввода */
.inp-wrap{position:relative;margin-bottom:10px;}
.inp-wrap .inp-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.5;pointer-events:none;
}
.parch input{
  width:100%;background:rgba(0,0,0,.42);
  border:1px solid #5e3712;color:#f5d560;
  padding:11px 14px 11px 34px;font-size:14px;border-radius:10px;
  font-family:inherit;outline:none;
  box-shadow:inset 0 2px 7px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,160,40,.03);
  transition:border-color .2s,box-shadow .2s;
}
.parch input:focus{
  border-color:#d09430;
  box-shadow:inset 0 2px 7px rgba(0,0,0,.5),0 0 10px rgba(210,148,40,.28);
}
.parch input::placeholder{color:#4e3318;}
.parch .err{color:#ff8a55;font-size:11px;min-height:14px;margin:4px 0 6px;text-align:center;}
/* Кнопка войти */
.btn-g{
  display:block;width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(180deg,#c87428 0%,#a05818 55%,#7a3e08 100%);
  border:1px solid #de9e30;border-radius:12px;color:#fff8d8;
  font-weight:bold;font-size:13px;letter-spacing:3px;text-transform:uppercase;
  text-align:center;cursor:pointer;
  box-shadow:0 3px 0 #2e1204,0 0 18px rgba(200,116,40,.3),inset 0 1px 0 rgba(255,210,80,.18);
  transition:box-shadow .18s,transform .1s,filter .15s;
  text-shadow:0 1px 3px rgba(0,0,0,.65);
}
.btn-g:active{transform:translateY(2px);box-shadow:0 1px 0 #2e1204,0 0 6px rgba(200,116,40,.15);}
.btn-g:hover{filter:brightness(1.14);box-shadow:0 3px 0 #2e1204,0 0 28px rgba(230,140,30,.5),inset 0 1px 0 rgba(255,210,80,.22);}
/* Ссылка-переключатель */
.parch .sw{font-size:12px;color:#7e5532;margin-top:12px;text-align:center;padding-bottom:2px;}
.parch .sw a{color:#cc9442;cursor:pointer;border-bottom:1px solid #6e4222;}
/* Регистрация — приветствие */
.reg-welcome{font-size:12px;color:#b88442;text-align:center;margin-bottom:14px;line-height:1.5;font-style:italic;}
/* Капча */
.captcha-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.captcha-q{
  background:rgba(0,0,0,.48);border:1px solid #5e3712;border-radius:10px;
  padding:10px 12px;font-size:15px;font-weight:bold;color:#f5c838;
  white-space:nowrap;flex-shrink:0;letter-spacing:1px;
  box-shadow:inset 0 2px 7px rgba(0,0,0,.55);
}
.captcha-refresh{
  flex-shrink:0;width:34px;height:38px;border-radius:10px;
  background:rgba(0,0,0,.38);border:1px solid #5e3712;
  color:#aa7832;font-size:18px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:color .15s,border-color .15s,box-shadow .15s;
}
.captcha-refresh:hover{color:#f5c838;border-color:#e0a83a;box-shadow:0 0 8px rgba(220,140,30,.25);}
/* Карточки рас */
.race-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;}
.rcard{
  padding:8px 5px;
  background:linear-gradient(160deg,rgba(255,160,40,.04) 0%,rgba(0,0,0,.32) 100%);
  border:1px solid #4e3016;border-radius:12px;cursor:pointer;text-align:center;
  transition:border-color .15s,box-shadow .15s,background .15s;
}
.rcard:hover{border-color:#925e22;background:linear-gradient(160deg,rgba(255,160,40,.08) 0%,rgba(0,0,0,.28) 100%);}
.rcard.sel{
  border-color:#f5c838;
  background:linear-gradient(160deg,rgba(255,185,50,.1) 0%,rgba(0,0,0,.28) 100%);
  box-shadow:0 0 14px rgba(245,195,60,.28),inset 0 0 0 1px rgba(255,200,60,.1);
}
.rcard .rg{font-size:24px;line-height:1;margin-bottom:3px;}
.rcard .rn{font-size:10px;font-weight:bold;color:#e0a83a;}
.rcard .rb{font-size:8px;color:#745232;margin-top:2px;line-height:1.3;}
.parch .rl,.parch .rr{display:none;}

/* ===== ИГРА ===== */
#app{position:fixed;inset:0;}
#main{position:absolute;inset:0;}
#mapwrap{position:absolute;inset:0;overflow:hidden;touch-action:none;}
#canvas{display:block;}

/* ── Уведомления вверху по центру ── */
#topnotif{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:20;
}
.tn-btn{
  width:40px;height:36px;position:relative;
  background:linear-gradient(180deg,#e0a020,#8a5c0e);
  border:2px solid #f5cc50;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.75);
}
.tn-btn .nb{
  position:absolute;top:-5px;right:-5px;
  background:#e03030;color:#fff;font-size:8px;font-weight:bold;
  border-radius:5px;padding:0 3px;min-width:14px;text-align:center;
  display:none;border:1px solid #0a0604;line-height:14px;
}
.tn-btn .nb.vis{display:block;}

/* ── ПРАВАЯ НАВИГАЦИОННАЯ ПАНЕЛЬ ── */
#rnav-wrap{
  position:absolute;top:50%;right:0;
  transform:translateY(-50%);
  display:flex;flex-direction:row-reverse;align-items:center;
  z-index:20;
}
#rnav-toggle{
  width:30px;height:76px;
  background:linear-gradient(180deg,#e0aa2a,#9a6c1a);
  border:2px solid #f5cc50;border-right:0;
  border-radius:14px 0 0 14px;
  color:#fff8d0;font-size:22px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:filter .15s;
  box-shadow:-3px 0 14px rgba(0,0,0,.65);
}
#rnav-toggle:active{filter:brightness(1.25);}
#rnav{
  display:flex;flex-direction:column;gap:0;
  padding:0;width:0;
  background:linear-gradient(180deg,#3e1e0a,#1a0a04);
  border:2px solid #9a6c1a;border-right:0;
  border-radius:14px 0 0 14px;
  overflow:hidden;
  transition:width .28s,padding .28s;
  box-shadow:-4px 0 20px rgba(0,0,0,.85);
}
#rnav.open{width:92px;padding:8px;gap:6px;}
.rn-btn{
  width:68px;height:68px;flex-shrink:0;
  background:linear-gradient(180deg,#7a4520,#341408);
  border:2px solid #a07828;border-radius:12px;
  color:#f0c040;font-size:9px;font-weight:bold;letter-spacing:.3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;transition:border-color .15s,filter .15s;
  box-shadow:inset 0 1px 0 rgba(255,210,70,.12);
}
.rn-btn:active{filter:brightness(1.3);}
.rn-btn.active{border-color:#f0c040;background:linear-gradient(180deg,#9a5828,#421e0a);
  box-shadow:0 0 14px rgba(230,170,30,.45);}
.rn-btn .ri{font-size:28px;line-height:1;}

/* ── Кнопки снизу ── */
#btn-menu{
  position:absolute;bottom:8px;left:8px;z-index:20;
  width:62px;height:62px;
  background:linear-gradient(180deg,#6a3818,#2e120a);
  border:2px solid #b08830;border-radius:14px;
  color:#f0c040;font-size:9px;font-weight:bold;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.8),0 0 10px rgba(180,110,20,.25);transition:filter .15s;
}
#btn-menu:active{filter:brightness(1.3);}
#btn-menu .bi{font-size:26px;line-height:1;}
#btn-chat{
  position:absolute;bottom:8px;right:8px;z-index:20;
  width:54px;height:54px;
  background:linear-gradient(180deg,#1c3c1c,#0c1c0c);
  border:2px solid #44aa44;border-radius:14px;
  color:#90ff90;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.8),0 0 10px rgba(40,160,40,.2);transition:filter .15s;
}
#btn-chat:active{filter:brightness(1.3);}
#chat-nb{
  position:absolute;bottom:62px;right:8px;z-index:21;
  background:#e03030;color:#fff;font-size:9px;font-weight:bold;
  border-radius:8px;padding:1px 5px;
  display:none;border:2px solid #0a0604;
}

/* Поиск по координатам */
#world-search{
  position:absolute;top:52px;right:8px;z-index:11;
  display:none;align-items:center;gap:4px;
}
.loc-world #world-search{display:flex;}
#world-search-btn{
  width:34px;height:34px;
  background:rgba(20,8,2,.85);border:1px solid #c8a030;border-radius:8px;
  color:#f0c040;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.7);
}
#world-search-form{
  display:flex;align-items:center;gap:4px;
  background:rgba(20,8,2,.92);border:1px solid #c8a030;
  border-radius:8px;padding:4px 6px;
  box-shadow:0 2px 8px rgba(0,0,0,.7);
}
#ws-x,#ws-y{
  width:52px;padding:4px 6px;border-radius:5px;
  background:#1a0c04;border:1px solid #8a6020;
  color:#f0c040;font-size:13px;font-weight:bold;
  font-family:inherit;outline:none;text-align:center;
}
#ws-go{
  width:28px;height:28px;background:linear-gradient(180deg,#c83020,#8b1010);
  border:1px solid #e05050;border-radius:5px;
  color:#fff;font-size:14px;font-weight:bold;cursor:pointer;
}
#ws-close{
  width:24px;height:24px;background:rgba(100,60,20,.6);
  border:1px solid #8a6020;border-radius:5px;
  color:#f0c040;font-size:12px;cursor:pointer;
}
/* Координаты карты мира */
#world-coords{
  display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(22,9,2,.88);border:1px solid #c8a030;border-radius:20px;
  color:#f0c040;font-size:12px;font-weight:bold;padding:3px 12px;
  z-index:10;white-space:nowrap;pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.7);
}
#world-compass{
  display:none;position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));
}
.loc-world #world-coords,.loc-world #world-compass{display:block;}
#timebar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  background:rgba(10,4,1,.85);color:#e8d090;padding:2px 12px;border-radius:12px;
  font-size:12px;font-family:monospace;font-weight:bold;z-index:5;
  border:1px solid rgba(200,150,40,.25);pointer-events:none;}

/* ── 7-вкладочная нижняя навигация (в меню-экранах) ── */
#cabinet-bar{
  position:fixed;bottom:0;left:0;right:0;height:60px;z-index:60;
  background:linear-gradient(180deg,#301608,#180c04);
  border-top:2px solid #9a6c1a;border-radius:16px 16px 0 0;
  display:none;
}
#cabinet-bar.vis{display:flex;}
.cb-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;border-top:2px solid transparent;
  color:#7a5020;font-size:8px;font-weight:bold;letter-spacing:.3px;
  cursor:pointer;transition:color .15s,border-color .15s;
  margin-top:-2px;border-radius:12px 12px 0 0;
}
.cb-tab .ci{font-size:18px;line-height:1;}
.cb-tab.active{color:#f5b830;border-color:#f5b830;}
.cb-tab:active{background:rgba(255,200,30,.1);}

/* Тосты */
#toasts{position:fixed;top:44px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:4px;
  pointer-events:none;width:90%;max-width:380px;}
.toast{background:rgba(10,4,2,.97);border:1px solid var(--gold);
  color:var(--gold2);padding:7px 12px;border-radius:12px;font-size:13px;
  text-align:center;animation:tsin .2s,tout .25s 2.7s forwards;
  box-shadow:0 4px 14px rgba(0,0,0,.75),0 0 6px rgba(180,120,20,.15);}
.toast.err{border-color:#c44;color:#ffb0b0;}
.toast.ok{border-color:#5cff7a;color:#c8ffc8;}
@keyframes tsin{from{opacity:0;transform:translateY(-10px);}}
@keyframes tout{to{opacity:0;}}

/* Модалки — стиль «пергамент» как в оригинале */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:8px;
  animation:fadein .15s;}
@keyframes fadein{from{opacity:0;}}
.mbox{
  background:linear-gradient(180deg,#f4e6c4,#ead6a4);
  border:2px solid #c8a030;border-radius:18px;
  max-width:440px;width:100%;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,220,120,.4),0 12px 48px rgba(0,0,0,.9);}
.mhead{
  background:linear-gradient(180deg,#c83030,#8b1010);
  color:#fff;padding:9px 36px 9px 12px;font-size:14px;font-weight:bold;
  text-align:center;border-bottom:2px solid #c8a030;border-radius:16px 16px 0 0;
  position:relative;letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.mhead .xb{
  position:absolute;top:50%;right:6px;transform:translateY(-50%);
  width:28px;height:28px;
  background:linear-gradient(180deg,#c44,#722);
  border:2px solid rgba(255,255,255,.5);border-radius:8px;font-size:16px;
  color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center;}
.mbody{
  flex:1;overflow-y:auto;padding:12px;
  background:transparent;
  color:#3a1a08;font-size:13px;line-height:1.5;}
.mbody p{margin-bottom:5px;}
.mfoot{padding:8px 10px;background:rgba(200,160,40,.15);
  border-top:1px solid rgba(200,160,40,.4);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
/* Кнопки в пергаментном стиле */
.mbtn{
  padding:9px 16px;
  background:linear-gradient(180deg,#7a4020,#3e1808);
  color:#f0d080;border:2px solid #c8a030;border-radius:10px;
  font-weight:bold;font-size:12px;letter-spacing:.5px;min-width:90px;
  box-shadow:0 2px 6px rgba(60,12,4,.55);transition:filter .15s;}
.mbtn:active{transform:translateY(1px);box-shadow:none;}
.mbtn:disabled{opacity:.4;cursor:not-allowed;}
.mbtn.red{background:linear-gradient(180deg,#d44040,#6a1818);border-color:#e85858;color:#fff;border-radius:10px;}
.mbtn.gold{background:linear-gradient(180deg,#d4a030,#8a6010);border-color:#f0c040;color:#1a0800;border-radius:10px;}
.mbtn.gray{background:linear-gradient(180deg,#6a5840,#342818);border-color:#9a8060;color:#d8c8a8;border-radius:10px;}
/* Кнопки-иконки в карточке замка на карте мира */
.wm-action-btn{
  background:linear-gradient(180deg,#f4e0a8,#d8bc72);
  border:2px solid #c8a030;border-radius:12px;
  padding:8px 4px;text-align:center;cursor:pointer;
  color:#3a1a08;font-size:10px;font-weight:bold;
  transition:filter .15s;box-shadow:0 2px 6px rgba(0,0,0,.25);
}
.wm-action-btn:active{filter:brightness(.9);}
.wm-action-btn.wm-disabled{opacity:.4;cursor:not-allowed;}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px;}
.bcard{background:linear-gradient(180deg,#5e3420,#2e1208);
  border:2px solid var(--gold3);border-radius:10px;padding:7px 5px;
  cursor:pointer;text-align:center;}
.bcard:hover{border-color:var(--gold2);transform:translateY(-1px);}
.bcard.cant{opacity:.4;cursor:not-allowed;}
.bcard img{width:42px;height:42px;image-rendering:pixelated;margin:0 auto 3px;display:block;object-fit:contain;}
.bcard .bn{font-size:11px;font-weight:bold;color:var(--gold2);line-height:1.2;margin-bottom:3px;}
.bcard .bc{font-size:10px;color:#c0a880;line-height:1.4;}
.mbar{height:10px;background:rgba(0,0,0,.5);border:1px solid var(--gold3);
  border-radius:5px;overflow:hidden;margin:5px 0;}
.mbar-f{height:100%;background:linear-gradient(90deg,#5cffe0,#00c880);}
.urow{background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;padding:8px;margin-bottom:6px;}
.urow .uh{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
.urow img{image-rendering:pixelated;flex-shrink:0;}
.urow .un{font-weight:bold;color:var(--gold2);font-size:13px;}
.urow .us{font-size:11px;color:#b0a080;}
.urow .uc{font-size:11px;color:#e0c890;margin-bottom:4px;}
.urow .ui{display:flex;gap:5px;align-items:center;}
.urow input{width:55px;padding:5px;background:#0a2010;
  border:2px solid var(--gold);color:#70ff70;
  border-radius:4px;font-family:inherit;font-size:12px;text-align:center;outline:none;}
/* Технологии */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;}
.tcard{background:linear-gradient(180deg,#1e3040,#0e1e2e);
  border:2px solid #3a5a7a;border-radius:10px;padding:8px;cursor:pointer;}
.tcard:hover{border-color:#5a8aaa;}
.tcard.done{border-color:#3a8a4a;background:linear-gradient(180deg,#1a3a1a,#0a2a0a);}
.tcard.cant{opacity:.45;cursor:not-allowed;}
.tcard .tn{font-weight:bold;color:#7ad4ff;font-size:12px;margin-bottom:3px;}
.tcard.done .tn{color:#7aff7a;}
.tcard .td{font-size:10px;color:#a0b0c0;line-height:1.3;}

/* ЧАТ */
#chat-panel{
  position:fixed;bottom:62px;right:8px;
  width:min(320px,calc(100vw - 16px));
  height:min(460px,calc(100vh - 150px));
  background:linear-gradient(180deg,#1e1006,#0e0804);
  border:2px solid var(--gold);border-radius:14px;
  display:flex;flex-direction:column;z-index:21;
  box-shadow:0 8px 32px rgba(0,0,0,.9);overflow:hidden;
  transform:scale(0) translateY(16px);transform-origin:bottom right;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1);
  pointer-events:none;opacity:0;}
#chat-panel.open{transform:scale(1) translateY(0);pointer-events:all;opacity:1;}
#chat-head{background:linear-gradient(180deg,var(--red2),var(--red));
  padding:7px 10px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:2px solid var(--gold3);
  border-radius:12px 12px 0 0;flex-shrink:0;}
#chat-head span{font-size:14px;font-weight:bold;color:var(--gold2);}
#chat-head button{width:24px;height:24px;background:linear-gradient(180deg,#c44,#722);
  border:1px solid #fff;border-radius:6px;color:#fff;font-size:14px;font-weight:bold;}
#chat-msgs{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:3px;}
#chat-msgs::-webkit-scrollbar{width:3px;}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px;}
.cmsg{padding:4px 7px;background:rgba(255,255,255,.04);
  border-left:2px solid var(--gold3);border-radius:0 8px 8px 0;
  font-size:12px;line-height:1.4;word-break:break-word;}
.cmsg.me{background:rgba(220,170,60,.13);border-left-color:var(--gold2);}
.cmsg.sys{border-left-color:#5cff7a;color:#5cff7a;text-align:center;}
.cmsg .ch{display:flex;gap:4px;align-items:center;margin-bottom:2px;}
.cmsg .cr{font-size:13px;}
.cmsg .cn{font-weight:bold;font-size:10px;color:var(--gold2);}
.cmsg .ct{font-size:9px;color:#604030;margin-left:auto;font-family:monospace;}
.cmsg .cx{color:#e0c890;font-size:12px;}
#chat-irow{display:flex;gap:5px;padding:7px;
  border-top:1px solid var(--gold3);background:rgba(0,0,0,.3);flex-shrink:0;}
#chat-inp{flex:1;background:#120a04;border:2px solid var(--gold3);
  color:#e0d0b0;padding:7px 9px;border-radius:10px;
  font-family:inherit;font-size:12px;outline:none;}
#chat-inp:focus{border-color:var(--gold2);}
#chat-send{width:38px;height:38px;background:linear-gradient(180deg,#3a8a4a,#1d4a26);
  border:2px solid #5cff7a;border-radius:10px;font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#chat-send:active{transform:scale(.9);}

@media(max-width:360px){
  .rb-res{font-size:11px;padding:3px 5px;}
  .loc-tab{font-size:10px;}
  .bb-btn{font-size:8px;}
  .bb-ico{font-size:18px;}
  .bgrid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));}
}

async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',
    headers:{'Content-Type':'application/json'},...opts,
    body:opts.body?JSON.stringify(opts.body):undefined});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||'HTTP '+r.status);
  return d;
}
async function refreshState(){
  S=await api('/api/state');
  if(S.player.techs)playerTechs=S.player.techs;
  // Обогащаем клетки мира тегами альянсов
  if(S.world&&S.alliances){
    worldAlliances=S.alliances;
    if(!S.worldPlayers)S.worldPlayers={};
    for(const c of S.world){
      if(c.type==='player'&&c.player){
        S.worldPlayers[c.player]=S.worldPlayers[c.player]||{};
      }
    }
  }
  renderTopbar();renderMap();
}

// ── WS ─────────────────────────────────────────────────
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/`);
  ws.onopen=()=>setConn(true);
  ws.onclose=()=>{setConn(false);setTimeout(connectWS,3000);};
  ws.onerror=()=>{};
  ws.onmessage=ev=>{
    let m;try{m=JSON.parse(ev.data);}catch{return;}
    if(m.type==='state'){S.player=m.player;if(m.world)S.world=m.world;if(m.player.techs)playerTechs=m.player.techs;renderTopbar();renderMap();}
    else if(m.type==='reports'){
      for(const r of m.items){
        toast(r.txt,r.kind==='battle-loss'?'err':r.kind==='build'?'ok':'');
        if(r.kind==='build'){setTimeout(()=>refreshState(),400);pushNotif('🏗 Строительство','Постройка завершена!');}
        else if(r.kind==='train'){pushNotif('⚔ Тренировка','Обучение юнитов завершено!');}
        else if(r.kind==='battle-win'){pushNotif('🏆 Победа!',r.txt);}
        else if(r.kind==='battle-loss'){pushNotif('⚔ Поражение',r.txt);}
        else if(r.txt&&r.txt.includes('Экспедиция вернулась')){pushNotif('🗺 Экспедиция',r.txt);}
      }
    }
    else if(m.type==='chat'){appendChat(m.msg);if(!chatOpen){chatUnread++;const b=$('#chat-nb');b.style.display='block';b.textContent=chatUnread>99?'99+':chatUnread;}}
  };
}

//  ШЕСТИУГОЛЬНАЯ СЕТКА (СОТЫ)
//  flat-top hex: ширина W, высота H = W*sin(60°)
//  центр гекса (col,row):
//    cx = ox + col*(W*3/4)              — если чётный ряд
//    cx = ox + col*(W*3/4)              — нечётный смещён на H/2
//    cy = oy + row*H + (col%2)*H/2
// ══════════════════════════════════════════════════════
let hexSize = 52;  // радиус описанной окружности (размер гекса)
let vpX=0,vpY=0;
let selectedWorldHex=null; // подсвеченная сота на карте мира
let selectedGridHex=null;  // подсвеченная сота в замке/огороде

function hexW(R){return R*2;}
function hexH(R){return Math.round(R*Math.sqrt(3));}
// Центр гекса col,row
function hexCenter(col,row,R){
  const W=hexW(R),H=hexH(R);
  const x = col*(W*0.75);
  const y = row*H + (col%2)*(H/2);
  return {x,y};
}
// Вершины гекса (flat-top)
function hexPoints(cx,cy,R){
  const pts=[];
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i;
    pts.push({x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)});
  }
  return pts;
}

function roundedHexPath(ctx,pts,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const p0=pts[(i+5)%6],p1=pts[i],p2=pts[(i+1)%6];
    const d1=Math.hypot(p1.x-p0.x,p1.y-p0.y),d2=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    const rr=Math.min(r,d1/2,d2/2);
    const a1x=p1.x+(p0.x-p1.x)/d1*rr,a1y=p1.y+(p0.y-p1.y)/d1*rr;
    const a2x=p1.x+(p2.x-p1.x)/d2*rr,a2y=p1.y+(p2.y-p1.y)/d2*rr;
    if(i===0)ctx.moveTo(a1x,a1y);else ctx.lineTo(a1x,a1y);
    ctx.arcTo(p1.x,p1.y,a2x,a2y,rr);
  }
  ctx.closePath();
}

// Полупрозрачная заливка для карты мира (трава просвечивает)
function worldHexFill(c){
  if(c.type==='forest') return 'rgba(30,70,15,0.38)';
  if(c.type==='stone')  return 'rgba(80,74,66,0.36)';
  if(c.type==='player') return 'rgba(50,65,110,0.42)';
  if(c.type==='bandit') return 'rgba(80,42,15,0.40)';
  if(c.type==='oasis')  return 'rgba(30,90,130,0.38)';
  if(c.type==='caravan')return 'rgba(100,80,20,0.36)';
  return 'rgba(60,100,30,0.22)'; // grass — почти прозрачная
}

// Цвет заливки гекса по типу
function hexFill(c,loc,col,row,cols,rows){
  if(loc==='castle'){
    const cx=Math.floor(cols/2),cy=Math.floor(rows/2);
    const dist=Math.max(Math.abs(col-cx),Math.abs(row-cy));
    if(dist===0) return 'rgba(120,100,30,.55)';
    if(dist===1) return 'rgba(80,110,40,.4)';
    if(dist===2) return 'rgba(60,90,30,.35)';
    return 'rgba(40,70,20,.3)';
  }
  if(c.type==='forest')return 'rgba(30,70,15,.45)';
  if(c.type==='stone') return 'rgba(80,75,60,.45)';
  if(c.type==='grass') return 'rgba(60,110,30,.35)';
  if(c.type==='player')  return 'rgba(50,60,110,.45)';
  if(c.type==='bandit')  return 'rgba(90,50,20,.45)';
  if(c.type==='oasis')   return 'rgba(30,100,65,.45)';
  if(c.type==='caravan') return 'rgba(70,85,25,.4)';
  return 'rgba(55,90,35,.35)';
}
function hexStroke(c,loc,col,row,cols,rows){
  if(loc==='castle'){
    const cx=Math.floor(cols/2),cy=Math.floor(rows/2);
    const dist=Math.max(Math.abs(col-cx),Math.abs(row-cy));
    if(dist===0) return 'rgba(212,162,54,.9)';
    if(dist===1) return 'rgba(180,150,70,.55)';
    return 'rgba(255,255,255,.18)';
  }
  if(c.type==='forest')return 'rgba(255,255,255,.15)';
  if(c.type==='stone') return 'rgba(255,255,255,.2)';
  return 'rgba(255,255,255,.15)';
}

let hitHexes=[];

function renderMap(){
  if(!S?.player)return;
  const main=$('#main');
  if(main)main.className=LOC==='world'?'loc-world':'';
  if(LOC==='castle')drawHexGrid(S.player.castle,CASTLE_COLS,CASTLE_ROWS,'castle');
  else if(LOC==='lands')drawHexGrid(S.player.lands,LANDS_COLS,LANDS_ROWS,'lands');
  else{drawWorldHex();updateWorldCoords();}
}

function calcHexSize(cols,rows,W,H){
  // Подбираем размер гекса чтобы вся сетка влезла в экран
  // Flat-top hex grid, cols колонн, rows строк
  // Ширина сетки ≈ cols*(R*1.5) + R*0.5
  // Высота сетки ≈ rows*H + H/2
  for(let R=80;R>=18;R-=2){
    const gw=(cols*(R*1.5)+R*0.5)*1.05;
    const gh=(rows*hexH(R)+hexH(R)*0.5)*1.05;
    if(gw<=W && gh<=H)return R;
  }
  return 18;
}

function drawHexGrid(cells,cols,rows,loc){
  const canvas=$('#canvas');
  const mw=$('#main').clientWidth,mh=$('#main').clientHeight;
  const dpr=devicePixelRatio||1;
  canvas.width=mw*dpr;canvas.height=mh*dpr;
  canvas.style.width=mw+'px';canvas.style.height=mh+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Размер гекса — подбираем чтобы влезло
  const R=calcHexSize(cols,rows,mw,mh);
  hexSize=R;

  const W=hexW(R),H=hexH(R);
  // Границы сетки
  const gridW=cols*(R*1.5)+R*0.5;
  const gridH=rows*H+H*0.5;
  const ox=(mw-gridW)/2+vpX;
  const oy=(mh-gridH)/2+vpY;

  // Фон — трава
  const _gt=gi('ground/grass_texture.jpg');
  if(_gt?.complete&&_gt.naturalWidth){
    ctx.fillStyle=ctx.createPattern(_gt,'repeat');
  } else {
    ctx.fillStyle=loc==='castle'?'#2a4a18':'#1a3a0a';
  }
  ctx.fillRect(0,0,mw,mh);

  hitHexes=[];
  const now=Date.now();
  const queue=S.player.queue||[];

  // Сортировка по row потом col для правильного z-order
  const sorted=[...cells].filter(c=>c.type!=='wall').sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);

  for(const c of sorted){
    const {x:hx,y:hy}=hexCenter(c.col,c.row,R);
    const cx2=ox+hx+R,cy2=oy+hy+H/2;
    const pts=hexPoints(cx2,cy2,R);

    // Заливка
    roundedHexPath(ctx,pts,R*0.18);
    ctx.fillStyle=hexFill(c,loc,c.col,c.row,cols,rows);
    ctx.fill();
    // Тонкая внутренняя тень
    if(loc==='castle'){
      ctx.save();
      roundedHexPath(ctx,pts,R*0.18);ctx.clip();
      const grd=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,R);
      grd.addColorStop(0,'rgba(255,255,200,.08)');
      grd.addColorStop(1,'rgba(0,0,0,.25)');
      ctx.fillStyle=grd;ctx.fill();
      ctx.restore();
    }
    roundedHexPath(ctx,pts,R*0.18);
    ctx.strokeStyle=hexStroke(c,loc,c.col,c.row,cols,rows);
    ctx.lineWidth=loc==='castle'?2:1.5;
    ctx.stroke();

    // Подсветка выбранной соты
    const _isSel=selectedGridHex&&selectedGridHex.col===c.col&&selectedGridHex.row===c.row;
    if(_isSel){
      ctx.save();
      for(let g=3;g>=1;g--){
        roundedHexPath(ctx,pts,R*0.18);
        ctx.strokeStyle=`rgba(255,215,60,${0.25*g})`;ctx.lineWidth=g*3;ctx.stroke();
      }
      roundedHexPath(ctx,pts,R*0.18);
      ctx.strokeStyle='rgba(255,230,80,0.95)';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
    }

    // Декор биома
    if(loc==='lands'&&!c.bldId){
      let dk=null;
      if(c.type==='forest')dk='ground/lumber.png';
      else if(c.type==='stone')dk='ground/mount.png';
      if(dk){
        const di=gi(dk);
        if(di?.complete&&di.naturalWidth){
          const dw=Math.round(R*1.3),dh=Math.round(di.naturalHeight/di.naturalWidth*dw);
          ctx.drawImage(di,cx2-dw/2,cy2-dh*0.75,dw,dh);
        }
      }
    }

    // Здание
    if(c.bldId){
      const def=BUILDINGS[c.bldId]||LAND_BUILDINGS[c.bldId];
      if(def){
        // Для добывающих зданий — разный спрайт по уровню
        let imgKey=def.img;
        if(def.lvlImg){
          const li=def.lvlImg;
          imgKey=c.level<=1?li[0]:c.level<=4?li[1]:li[2];
        }
        const bi=gi(imgKey);
        if(bi?.complete&&bi.naturalWidth){
          const bw=Math.round(R*1.5),bh=Math.round(bi.naturalHeight/bi.naturalWidth*bw);
          ctx.drawImage(bi,cx2-bw/2,cy2-bh*0.8,bw,bh);
        }
        // Уровень
        if(c.level>0){
          ctx.fillStyle='rgba(0,0,0,.75)';
          ctx.beginPath();ctx.arc(cx2+R*0.55,cy2-R*0.55,8,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#f0c958';ctx.font='bold 9px monospace';ctx.textAlign='center';
          ctx.fillText(c.level,cx2+R*0.55,cy2-R*0.55+3);
        }
      }
    }

    // Декор пустых гексов замка
    if(loc==='castle' && !c.bldId && c.type==='inner'){
      const cx2f=Math.floor(cols/2),cy2f=Math.floor(rows/2);
      const dist2=Math.max(Math.abs(c.col-cx2f),Math.abs(c.row-cy2f));
      // Мощение вокруг центра
      if(dist2===1){
        ctx.strokeStyle='rgba(180,150,80,.3)';ctx.lineWidth=1;
        // Ромбики мощения
        for(let di=0;di<4;di++){
          const tx=cx2+(Math.random()-.5)*R*0.8,ty=cy2+(Math.random()-.5)*R*0.5;
          ctx.strokeRect(tx-3,ty-2,6,4);
        }
      }
      // Трава на дальних
      if(dist2>=2){
        ctx.fillStyle='rgba(80,120,40,.2)';
        for(let gi=0;gi<3;gi++){
          const gx=cx2+(Math.random()-.5)*R*1.2,gy=cy2+(Math.random()-.5)*R*0.7;
          ctx.fillRect(gx-1,gy-4,2,8);
          ctx.fillRect(gx-3,gy-2,6,2);
        }
      }
    }

    // В очереди
    const inQ=queue.find(j=>j.loc===loc&&j.col===c.col&&j.row===c.row);
    if(inQ){
      // Пульсирующий контур
      const a=0.4+0.3*Math.sin(now/400);
      roundedHexPath(ctx,pts,R*0.18);
      ctx.strokeStyle=`rgba(255,200,0,${a})`;ctx.lineWidth=3;ctx.stroke();
      // Иконка
      ctx.font=`${Math.round(R*0.5)}px serif`;ctx.textAlign='center';
      ctx.fillText('🏗',cx2,cy2+R*0.2);
      // Прогресс
      const elapsed=now-inQ.start,total=inQ.end-inQ.start;
      const pct=Math.min(1,Math.max(0,elapsed/total));
      const bw=R*1.2,bx=cx2-bw/2,by=cy2+R*0.6;
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(bx,by,bw,5);
      ctx.fillStyle=`hsl(${120*pct},100%,50%)`;ctx.fillRect(bx,by,bw*pct,5);
      // Таймер
      const rem=Math.ceil((inQ.end-now)/1000);
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(cx2-R*0.7,by+6,R*1.4,13);
      ctx.fillStyle='#ffd44a';ctx.font=`bold 9px monospace`;ctx.textAlign='center';
      ctx.fillText('⌛'+fmtT(rem),cx2,by+16);
    }

    hitHexes.push({col:c.col,row:c.row,cx:cx2,cy:cy2,R,type:c.type,data:c});
  }
}

function drawWorldHex(){
  const canvas=$('#canvas');
  const mw=$('#main').clientWidth,mh=$('#main').clientHeight;
  const dpr=devicePixelRatio||1;
  canvas.width=mw*dpr;canvas.height=mh*dpr;
  canvas.style.width=mw+'px';canvas.style.height=mh+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Крупнее чем auto-fit — чтобы замки были видны, карта листается
  const R=33;
  const W=hexW(R),H=hexH(R);
  const gridW=WORLD_COLS*(R*1.5)+R*0.5;
  const gridH=WORLD_ROWS*H+H*0.5;
  const ox=(mw-gridW)/2+vpX;
  const oy=(mh-gridH)/2+vpY;

  // Фон — текстура травы
  const grassTex=gi('ground/grass_texture.jpg');
  if(grassTex?.complete&&grassTex.naturalWidth){
    const pat=ctx.createPattern(grassTex,'repeat');
    ctx.fillStyle=pat;
  } else {
    ctx.fillStyle='#3a6820';
  }
  ctx.fillRect(0,0,mw,mh);

  hitHexes=[];
  const myName=S.player.username;
  const castleS=gi('ground/castle_small.png');
  const banditS=gi('ground/bandit_camp.png');
  if(!S?.world)return;
  const sorted=[...S.world].sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);

  for(const c of sorted){
    const {x:hx,y:hy}=hexCenter(c.col,c.row,R);
    const cx2=ox+hx+R,cy2=oy+hy+H/2;
    const pts=hexPoints(cx2,cy2,R);
    const isSel=selectedWorldHex&&selectedWorldHex.col===c.col&&selectedWorldHex.row===c.row;

    const hexPath=()=>roundedHexPath(ctx,pts,R*0.15);

    // Полупрозрачная заливка
    hexPath();
    const fill=worldHexFill(c);
    ctx.fillStyle=fill;
    ctx.fill();

    // Обычная граница
    hexPath();
    ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=1;ctx.stroke();

    // Подсветка выбранной соты — свечение по краям
    if(isSel){
      ctx.save();
      for(let glow=3;glow>=1;glow--){
        hexPath();
        ctx.strokeStyle=`rgba(255,215,60,${0.25*glow})`;
        ctx.lineWidth=glow*3;
        ctx.stroke();
      }
      hexPath();
      ctx.strokeStyle='rgba(255,230,80,0.95)';
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.restore();
    }

    if(c.type==='player'){
      const isMe=c.player===myName;
      const myAllianceId=S.player.alliance?.id;
      const cellPlayer=S.worldPlayers?.[c.player];
      const isAlly=myAllianceId&&cellPlayer?.allianceId===myAllianceId&&!isMe;
      if(castleS?.complete&&castleS.naturalWidth){
        const cw=Math.round(R*1.8),ch=Math.round(castleS.naturalHeight/castleS.naturalWidth*cw);
        ctx.drawImage(castleS,cx2-cw/2,cy2-ch*0.75,cw,ch);
      }
      // Ободок: золото — я, зелёный — союзник
      if(isMe||isAlly){
        ctx.strokeStyle=isMe?'#f0c958':'#5cff7a';ctx.lineWidth=2.5;
        roundedHexPath(ctx,pts,R*0.15);ctx.stroke();
      }
      // Щит защиты новичка
      const defPlayer=S.player.username===c.player?S.player:null;
      if(defPlayer?.protectedUntil>Date.now()){
        ctx.font=`${R*0.5}px serif`;ctx.textAlign='center';
        ctx.fillText('🛡',cx2+R*0.6,cy2-R*0.5);
      }
      // Тег альянса
      const allianceTag=cellPlayer?.allianceTag||null;
      const lbl=(isMe?'★':'')+( allianceTag?'['+allianceTag+'] ':'' )+(c.player||'');
      ctx.fillStyle='rgba(0,0,0,.8)';
      const tw=Math.max(40,ctx.measureText(lbl).width+8);
      ctx.fillRect(cx2-tw/2,cy2+R*0.5,tw,13);
      ctx.fillStyle=isMe?'#f0c958':'#e0d0b0';
      ctx.font=`${Math.max(8,Math.round(R*0.28))}px Arial`;ctx.textAlign='center';
      ctx.fillText(lbl,cx2,cy2+R*0.5+10);
    } else if(c.type==='bandit'){
      if(banditS?.complete&&banditS.naturalWidth){
        const bw=Math.round(R*1.6),bh=Math.round(banditS.naturalHeight/banditS.naturalWidth*bw);
        ctx.drawImage(banditS,cx2-bw/2,cy2-bh*0.75,bw,bh);
      } else {ctx.font=`${R*0.7}px serif`;ctx.textAlign='center';ctx.fillText('🐺',cx2,cy2+R*0.3);}
      ctx.fillStyle='rgba(0,0,0,.8)';
      const pw='⚔'+c.power;const twp=ctx.measureText(pw).width+6;
      ctx.fillRect(cx2-twp/2,cy2+R*0.5,twp,13);
      ctx.fillStyle='#ff9080';ctx.font=`bold ${Math.max(8,Math.round(R*0.28))}px Arial`;ctx.textAlign='center';
      ctx.fillText(pw,cx2,cy2+R*0.5+10);
      // Реликвия на клетке
      if(c.relic){
        ctx.font=`${Math.round(R*0.55)}px serif`;ctx.textAlign='center';
        ctx.fillText('⚡',cx2+R*0.55,cy2-R*0.45);
      }
    } else if(c.type==='oasis'){
      const rg={wood:'🌲',stone:'⛰',iron:'⛏',food:'🌾',gold:'🪙'}[c.resource]||'💎';
      ctx.font=`${R*0.8}px serif`;ctx.textAlign='center';
      ctx.fillText(rg,cx2,cy2+R*0.2);
      // Показываем владельца оазиса
      if(c.owner){
        const isMe=c.owner===S.player.username;
        ctx.fillStyle='rgba(0,0,0,.75)';
        const ow=isMe?'МОЙ':c.owner.slice(0,4);
        const tw=ctx.measureText(ow).width+6;
        ctx.fillRect(cx2-tw/2,cy2+R*0.45,tw,11);
        ctx.fillStyle=isMe?'#5cff7a':'#ffcc60';
        ctx.font=`bold ${Math.max(7,Math.round(R*0.22))}px Arial`;ctx.textAlign='center';
        ctx.fillText(ow,cx2,cy2+R*0.45+9);
      }
    }

    // Обоз
    if(c.type==='caravan'){
      ctx.font=`${R*0.8}px serif`;ctx.textAlign='center';
      ctx.fillText('🚚',cx2,cy2+R*0.2);
      ctx.fillStyle='rgba(0,0,0,.8)';
      const tw2=ctx.measureText('🚚').width+10;
      ctx.fillRect(cx2-tw2/2,cy2+R*0.45,tw2,11);
      ctx.fillStyle='#ffd44a';
      ctx.font=`bold ${Math.max(7,Math.round(R*0.22))}px Arial`;ctx.textAlign='center';
      ctx.fillText('Обоз',cx2,cy2+R*0.45+9);
    }

    hitHexes.push({col:c.col,row:c.row,cx:cx2,cy:cy2,R,type:c.type,data:c});
  }
}

// ── КЛИКИ ──────────────────────────────────────────────
function hitTestHex(px,py,cx,cy,R){
  // Расстояние от центра с учётом формы гекса
  const dx=Math.abs(px-cx),dy=Math.abs(py-cy);
  return dx<=R && dy<=hexH(R)/2 && dx/(R)+dy/(hexH(R)/2)<=1.0;
}
function onCanvasClick(px,py){
  if(!S?.player)return;
  // Ищем с конца (ближние сверху)
  for(let i=hitHexes.length-1;i>=0;i--){
    const h=hitHexes[i];
    if(hitTestHex(px,py,h.cx,h.cy,h.R)){
      if(LOC==='world'){
        selectedWorldHex={col:h.col,row:h.row};
        renderMap();
        showWorldModal(h.data||{col:h.col,row:h.row,type:h.type});
      }
      else{
        const cells=LOC==='castle'?S.player.castle:S.player.lands;
        const cell=cells.find(c=>c.col===h.col&&c.row===h.row);
        if(cell&&cell.type!=='wall'){
          selectedGridHex={col:h.col,row:h.row};
          renderMap();
          onCellClick(cell);
        }
      }
      break;
    }
  }
}

// ── DRAG ───────────────────────────────────────────────
function initDrag(){
  const mw=$('#mapwrap');
  const ptr=e=>e.touches?.[0]??e.changedTouches?.[0]??e;
  let sx=0,sy=0,svx=0,svy=0,moved=false,pressing=false;
  const dn=e=>{
    if(!e.touches&&e.button!==0)return;
    pressing=true;
    const p=ptr(e);sx=p.clientX;sy=p.clientY;svx=vpX;svy=vpY;moved=false;
  };
  const mv=e=>{
    if(!pressing)return;
    const p=ptr(e);const dx=p.clientX-sx,dy=p.clientY-sy;
    if(!moved&&(Math.abs(dx)>6||Math.abs(dy)>6))moved=true;
    if(!moved)return;
    vpX=svx+dx;vpY=svy+dy;
    renderMap();
  };
  const up=()=>{
    pressing=false;
    if(moved){mw.dataset.dragged='1';setTimeout(()=>mw.dataset.dragged='',80);}
  };
  mw.addEventListener('mousedown',dn);mw.addEventListener('touchstart',dn,{passive:true});
  mw.addEventListener('mousemove',mv);mw.addEventListener('touchmove',mv,{passive:true});
  window.addEventListener('mouseup',up);mw.addEventListener('touchend',up);
  mw.addEventListener('click',e=>{
    if(mw.dataset.dragged==='1')return;
    const rect=$('#canvas').getBoundingClientRect();
    const dpr=devicePixelRatio||1;
    const scaleX=($('#canvas').width/dpr)/rect.width;
    const scaleY=($('#canvas').height/dpr)/rect.height;
    onCanvasClick((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
  });
  window.addEventListener('resize',()=>{vpX=0;vpY=0;renderMap();});
  let lastTap=0;
  mw.addEventListener('touchend',()=>{
    const now=Date.now();
    if(now-lastTap<300){vpX=0;vpY=0;renderMap();}
    lastTap=now;
  });
}

// Анимационный цикл — только если есть очередь
let afId=null;
function startAnim(){
  if(afId)return;
  const loop=()=>{
    const hasQ=(S?.player?.queue||[]).filter(j=>j.loc===LOC).length>0;
    if(hasQ)renderMap();
    afId=requestAnimationFrame(loop);
  };
  afId=requestAnimationFrame(loop);
}

function modal({title,body,actions=[]}){
  const bg=document.createElement('div');bg.className='mbg';
  const m=document.createElement('div');m.className='mbox';
  m.innerHTML=`<div class="mhead">${title}<button class="xb">✕</button></div>`;
  const bd=document.createElement('div');bd.className='mbody';
  if(typeof body==='string')bd.innerHTML=body;
  else if(Array.isArray(body))body.forEach(x=>bd.appendChild(x));
  else bd.appendChild(body);
  m.appendChild(bd);
  if(actions.length){
    const ft=document.createElement('div');ft.className='mfoot';
    actions.forEach(a=>{
      const b=document.createElement('button');b.className='mbtn '+(a.kind||'');b.textContent=a.label;
      if(a.disabled)b.disabled=true;
      b.onclick=async()=>{if(a.handler)await a.handler(bg);if(a.close!==false)bg.remove();};
      ft.appendChild(b);
    });
    m.appendChild(ft);
  }
  bg.appendChild(m);m.querySelector('.xb').onclick=()=>bg.remove();
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);return bg;
}

function onCellClick(cell){
  const inQ=(S.player.queue||[]).find(j=>j.loc===LOC&&j.col===cell.col&&j.row===cell.row);
  if(inQ)return showJobModal(inQ);
  if(cell.bldId)return showBldModal(cell,LOC);
  showBuildPick(cell,LOC);
}

function showBuildPick(cell,loc){
  const isCastle=loc==='castle';
  const defs=isCastle?BUILDINGS:LAND_BUILDINGS;
  const clvl=getCLvl();
  let bg;
  const con=document.createElement('div');
  // Показать очереди строительства
  const maxQueues = clvl >= 5 ? 2 : 1;
  const activeQ = (S.player.queue||[]).filter(j=>j.loc===loc);
  const queueInfo = document.createElement('div');
  queueInfo.style.cssText = 'font-size:11px;color:#a09060;margin-bottom:8px;padding:5px;background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;';
  queueInfo.innerHTML = `Очереди строительства: ${activeQ.length}/${maxQueues}${clvl>=5?' 🔓 2 слота разблокированы':'  (2 слота при ратуше ур.5)'}`;
  con.appendChild(queueInfo);

  if(isCastle){
    // Группируем по категориям
    for(const [cat,catName] of Object.entries(BLD_CATS)){
      const catDefs=Object.entries(defs).filter(([id,d])=>d.cat===cat);
      if(!catDefs.length)continue;
      const h=document.createElement('div');
      h.style.cssText='font-size:12px;color:var(--gold2);margin:8px 0 5px;font-weight:bold;';
      h.textContent=catName;con.appendChild(h);
      const grid=document.createElement('div');grid.className='bgrid';
      catDefs.forEach(([id,def])=>{
        if(def.unique&&hasU(id)&&cell.bldId!==id)return;
        const rq=reqOk(id);
        const cost=calcCost(id,0),time=calcTime(id,0,clvl);
        const ok=canAfford(cost)&&rq;
        const s=spr(def.img);
        const card=document.createElement('div');card.className='bcard'+(ok?'':' cant');
        card.innerHTML=`${s?`<img src="${s}">`:'<div style="font-size:28px;margin:4px 0;">🏗</div>'}
          <div class="bn">${def.name}</div>
          <div class="bc">${costHtml(cost)}</div>
          <div class="bc" style="color:#8a8a6a;">⌛${fmtT(time)}</div>
          ${!rq?`<div class="bc" style="color:#ff8080;">🔒 Треб.</div>`:''}`;
        card.onclick=async()=>{
          if(!ok){toast(rq?'Не хватает ресурсов':'Требования не выполнены','err');return;}
          try{await api('/api/build',{method:'POST',body:{loc,col:cell.col,row:cell.row,bldId:id}});
            toast('Начато: '+def.name,'ok');bg.remove();await refreshState();}
          catch(err){toast(err.message,'err');}
        };
        grid.appendChild(card);
      });
      if(grid.children.length)con.appendChild(grid);
    }
  } else {
    // Земли — только по биому
    const grid=document.createElement('div');grid.className='bgrid';
    let cnt=0;
    for(const[id,def]of Object.entries(defs)){
      if(def.terrain&&def.terrain!==cell.type)continue;
      const cost=calcCost(id,0),time=calcTime(id,0,clvl);
      const ok=canAfford(cost);
      const s=spr(def.img);
      const card=document.createElement('div');card.className='bcard'+(ok?'':' cant');
      card.innerHTML=`${s?`<img src="${s}">`:'<div style="font-size:28px;margin:4px 0;">🌱</div>'}
        <div class="bn">${def.name}</div>
        <div class="bc">${costHtml(cost)}</div>
        <div class="bc" style="color:#8a8a6a;">⌛${fmtT(time)}</div>
        <div class="bc" style="color:#5cff7a;">+${def.produces?RES_L[def.produces]:''}/ч</div>`;
      card.onclick=async()=>{
        if(!ok){toast('Не хватает ресурсов','err');return;}
        try{await api('/api/build',{method:'POST',body:{loc,col:cell.col,row:cell.row,bldId:id}});
          toast('Начато: '+def.name,'ok');bg.remove();await refreshState();}
        catch(err){toast(err.message,'err');}
      };
      grid.appendChild(card);cnt++;
    }
    if(!cnt)grid.innerHTML='<p style="text-align:center;color:#a89070;padding:16px;grid-column:1/-1;">Нет доступных построек<br><small>Биом: '+cell.type+'</small></p>';
    con.appendChild(grid);
  }

  if(!con.children.length)con.innerHTML='<p style="text-align:center;color:#a89070;padding:16px;">Нет доступных построек</p>';
  const terrain={inner:'замок',grass:'трава',forest:'лес',stone:'камень'}[cell.type]||cell.type;
  bg=modal({title:`Строить — ${terrain}`,body:con});
}

function showBldModal(cell,loc){
  if(cell.bldId==='military_hq') return showMilitaryHQModal(cell);
  if(cell.bldId==='expedition' || cell.bldId==='magtower') return showArtifactsModal();
  const def=BUILDINGS[cell.bldId]||LAND_BUILDINGS[cell.bldId];if(!def)return;
  const clvl=getCLvl();
  const cost=calcCost(cell.bldId,cell.level),time=calcTime(cell.bldId,cell.level,clvl);
  const atMax=def.max&&cell.level>=def.max;
  const ok=!atMax&&canAfford(cost);
  const s=spr(def.img);
  let extra='';
  if(def.produces)extra=`<p>📈 Производство: <b style="color:#5cff7a;">+${(60*Math.pow(1.3,cell.level)).toFixed(0)}/ч</b></p>`;
  const descText = def.desc || BLD_DESC[cell.bldId] || '';
  if(descText) extra += `<p style="color:#a0c0e0;font-size:11px;margin-top:3px;">ℹ️ ${descText}</p>`;
  if(cell.bldId==='wall')     extra+=`<p style="color:#5cff7a;font-size:12px;">🛡 Текущий бонус: +${cell.level*5}% к защите</p>`;
  if(cell.bldId==='smithy')   extra+=`<p style="color:#5cff7a;font-size:12px;">⚔ Войска: +${cell.level*3}% атак, +${cell.level*2}% защ.</p>`;
  if(cell.bldId==='magicschool') extra+=`<p style="color:#a080ff;font-size:12px;">✨ Маг.бонус: +${cell.level*2}%</p>`;
  if(cell.bldId==='trap')     extra+=`<p style="color:#ffaa40;font-size:12px;">🪤 Урон ловушек: ${cell.level*30}</p>`;
  const bd=`
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;">
      ${s?`<img src="${s}" width="54" height="54" style="image-rendering:pixelated;flex-shrink:0;">`:
           '<div style="font-size:40px;flex-shrink:0;">🏗</div>'}
      <div><div style="font-size:16px;font-weight:bold;color:var(--gold2);">${def.name}</div>
        <div style="color:var(--gold);font-size:12px;">Уровень ${cell.level}</div>
        ${extra}
      </div>
    </div>
    <div style="background:rgba(0,0,0,.3);padding:8px;border-radius:4px;border:1px dashed var(--gold3);margin-top:6px;">
      <b style="color:var(--gold2);">Улучшить → ур.${cell.level+1}</b><br>
      ${costHtml(cost)}<br>
      <span style="color:var(--gold);">⌛ ${fmtT(time)}</span>
    </div>`;
  const rDelta=ratingDeltaClient(cell.bldId,cell.level+1);
  const actions=[{label:atMax?`Макс. уровень (${def.max})`:`Улучшить (+${rDelta}⭐)`,disabled:!ok,handler:async()=>{
    try{await api('/api/build',{method:'POST',body:{loc,col:cell.col,row:cell.row,bldId:cell.bldId}});
      toast(`Начато улучшение! +${rDelta} к рейтингу 🏆`,'ok');await refreshState();}
    catch(e){toast(e.message,'err');}
  }}];
  const trainables=Object.entries(UNITS).filter(([,u])=>u.race===S.player.race&&u.building===cell.bldId&&u.reqLvl<=cell.level);
  if(trainables.length)actions.push({label:'⚔ Тренировать',kind:'gold',handler:()=>showTrainModal(cell),close:true});
  if(cell.bldId!=='castle')actions.push({label:'Снести',kind:'red',handler:async(bg)=>{
    if(!confirm('Снести '+def.name+'?'))return;
    try{await api('/api/demolish',{method:'POST',body:{loc,col:cell.col,row:cell.row}});
      toast('Снесено');bg.remove();await refreshState();}
    catch(e){toast(e.message,'err');}
  },close:false});
  modal({title:def.name,body:bd,actions});
}

function showTrainModal(cell){
  const def=BUILDINGS[cell.bldId];
  const avail=Object.entries(UNITS).filter(([,u])=>u.race===S.player.race&&u.building===cell.bldId&&u.reqLvl<=cell.level);
  const con=document.createElement('div');
  con.innerHTML=`<p style="text-align:center;color:#a89070;margin-bottom:8px;">${def.name} ур.${cell.level} · Раса: ${RACES[S.player.race].name} · Очередь: ${(S.player.trainQueue||[]).length}/4</p>`;
  avail.forEach(([uid,u])=>{
    const have=S.player.army[uid]||0;
    const inQ=(S.player.trainQueue||[]).filter(j=>j.uid===uid).reduce((a,b)=>a+b.count,0);
    const s=spr(u.img);
    const row=document.createElement('div');row.className='urow';
    row.innerHTML=`
      <div class="uh">
        ${s?`<img src="${s}" width="28" height="44">`:'<div style="font-size:28px;">⚔</div>'}
        <div><div class="un">${u.name}</div>
          <div class="us">⚔${u.atk} 🛡${u.def} ❤${u.hp} 🏃${u.speed} 🎒${u.carry}</div>
          <div class="us">В замке: <b>${have}</b>${inQ?' · ждут: '+inQ:''}</div>
        </div>
      </div>
      <div class="uc">${costHtml(u.cost)} + 👥${u.people} · ⌛${fmtT(u.trainTime)}</div>
      <div class="ui">
        <input type="number" class="tnc" data-uid="${uid}" value="1" min="1" max="999">
        <button class="mbtn tnb" data-uid="${uid}" style="flex:1;padding:7px;font-size:11px;min-width:auto;">Нанять</button>
      </div>`;
    con.appendChild(row);
  });
  if(!avail.length)con.innerHTML+='<p style="text-align:center;color:#a89070;">Нет доступных юнитов<br><small>Нужен более высокий уровень здания</small></p>';
  const bg=modal({title:`⚔ ${def.name} — Тренировка`,body:con,actions:[]});
  bg.querySelectorAll('.tnb').forEach(btn=>{
    btn.onclick=async()=>{
      const uid=btn.dataset.uid;const inp=bg.querySelector(`.tnc[data-uid="${uid}"]`);

      try{const r=await api('/api/train',{method:'POST',body:{bldCol:cell.col,bldRow:cell.row,uid,count}});
        toast(`Начат найм: ${r.count}× ${UNITS[uid].name}`,'ok');bg.remove();await refreshState();}
      catch(e){toast(e.message,'err');}

function showJobModal(job){
  const def=BUILDINGS[job.bldId]||LAND_BUILDINGS[job.bldId];
  const rem=(job.end-Date.now())/1000,total=(job.end-job.start)/1000;
  const pct=Math.min(100,Math.max(0,(1-rem/total)*100));
  const s=spr(def?.img);
  const bd=`
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px;">
      ${s?`<img src="${s}" width="48" height="48" style="image-rendering:pixelated;">`:
           '<div style="font-size:36px;">🏗</div>'}
      <div>
        <div style="font-size:15px;font-weight:bold;color:var(--gold2);">${def?.name} → ур.${job.toLvl}</div>
        <div style="color:var(--gold);font-family:monospace;" data-timer="${job.end}">⌛ ${fmtT(rem)}</div>
      </div>
    </div>
    <div class="mbar"><div class="mbar-f" style="width:${pct}%"></div></div>`;
  modal({title:'🏗 Строительство',body:bd,actions:[
    {label:'Ускорить ×2 (за 🪙)',kind:'gold',disabled:rem<5,handler:async()=>{
      const idx=(S.player.queue||[]).indexOf(job);
      try{const r=await api('/api/speed-build',{method:'POST',body:{jobIndex:idx}});
        toast(`Ускорено за ${r.cost}🪙`,'ok');await refreshState();}
      catch(e){toast(e.message,'err');}
    }}
  ]});
}

        <div>

    if(!myOasis&&armyTotal()>0)actions.push({label:'🌿 Захватить',kind:'gold',handler:()=>showAttackModal(c),close:true});
    else if(!myOasis)actions.push({label:'Нет войск',disabled:true,handler:()=>{}});
  }else{
    title='Свободные земли';bd='<p>Здесь можно основать новый замок.</p>';

function showArmyModal(){
  let bd='';

    bd='<div style="display:flex;flex-direction:column;gap:5px;">';

      const n=S.player.army[uid];if(!n)continue;
      const u=UNITS[uid];const s=spr(u?.simg);
      bd+=`<div style="display:flex;gap:8px;align-items:center;background:rgba(0,0,0,.3);padding:7px;border:1px solid var(--gold3);border-radius:4px;">

  if((S.player.marches||[]).length){

      const eta=m.phase==='going'?m.arriveAt:m.returnAt;

      const dir=m.phase==='going'?'→':'←';

    for(const j of S.player.trainQueue){

      bd+=`<div style="font-size:12px;padding:4px 0;">${u?.name||j.uid} ×${j.count} · <span data-timer="${j.nextDone}">${fmtT((j.nextDone-Date.now())/1000)}</span></div>`;

      const barrackCell=S.player.castle.find(c=>c.bldId==='barracks'&&c.level>0)||S.player.castle.find(c=>c.bldId==='stable'&&c.level>0);

  });
}

function showAttackModal(target){
  const tn=target.type==='bandit'?'Разбойники':target.type==='oasis'?`Оазис ${RES_L[target.resource]||''}`:target.player||'?';
  const _wp=S.worldPlayers?.[target.player]||{};
  const tp=target.type==='bandit'?(target.power||100):target.type==='oasis'?(target.owner?80:30):(_wp.castleLevel||1)*200;
  const con=document.createElement('div');
  // Тип боя — только для атаки игрока или оазиса
  let battleType='attack';
  const isPlayer=target.type==='player';
  if(isPlayer){
    con.innerHTML=`<p style="text-align:center;margin-bottom:6px;">Цель: <b style="color:var(--gold2);">${tn}</b> · Сила обороны: ~<b>${tp}</b></p>
    <div style="display:flex;gap:6px;margin-bottom:8px;justify-content:center;">
      <button class="mbtn gray btype" data-t="raid" style="flex:1;font-size:11px;padding:5px 4px;">🏃 Набег<br><span style="font-size:10px;color:#a0b0a0;">Грабёж, мало потерь</span></button>
      <button class="mbtn red btype" data-t="attack" style="flex:1;font-size:11px;padding:5px 4px;">⚔ Нападение<br><span style="font-size:10px;color:#ffc0a0;">Полный бой, урон зданиям</span></button>
      <button class="mbtn btype" data-t="assault" style="flex:1;font-size:11px;padding:5px 4px;background:#6a1010;border-color:#cc3030;">🔥 Штурм<br><span style="font-size:10px;color:#ff9090;">Максимальный урон</span></button>
    </div>`;
  } else {
    con.innerHTML=`<p style="text-align:center;margin-bottom:8px;">Цель: <b style="color:var(--gold2);">${tn}</b> · Сила: <b>${tp}</b></p>`;
  }
  const sumDiv=document.createElement('div');
  sumDiv.style.cssText='background:rgba(0,0,0,.4);padding:7px;border:1px solid var(--gold);border-radius:4px;margin-bottom:7px;text-align:center;font-size:12px;';
  con.appendChild(sumDiv);
  const sel={};
  function refresh(){
    let pow=0,cnt=0,slow=0;
    for(const uid in sel){const n=sel[uid];if(!n)continue;const u=UNITS[uid];pow+=n*(u?.atk||0);cnt+=n;slow=Math.max(slow,u?.speed||18);}
    const pos=S.player.worldPos||{col:0,row:0};
    const dist=Math.max(1,Math.abs(pos.col-target.col)+Math.abs(pos.row-target.row));
    const t=slow*dist;
    const raidMult=battleType==='raid'?0.65:1;
    const effPow=Math.round(pow*raidMult);
    let out=cnt===0?'Выберите войска':effPow>=tp*1.5?'<span style="color:#5cff7a;">Лёгкая победа</span>':effPow>=tp?'<span style="color:#ffd44a;">Победа с потерями</span>':effPow>=tp*.6?'<span style="color:#ff8a4a;">Тяжёлый бой</span>':'<span style="color:#ff5a5a;">Разгром</span>';
    const typeInfo=battleType==='raid'?'🏃 Набег (атака ×0.65, мало потерь)':battleType==='assault'?'🔥 Штурм (2+ здания, двойной грабёж)':'⚔ Нападение (повреждает 1 здание)';
    sumDiv.innerHTML=`${typeInfo}<br>Войск: <b>${cnt}</b> · Сила: <b>${effPow}</b> · ${out}<br>В пути: <b>${fmtT(t)}</b>`;
    const gb=bg.querySelector('.atkgo');if(gb)gb.disabled=cnt===0;
  }
  const list=document.createElement('div');
  for(const uid in S.player.army){
    const have=S.player.army[uid];if(!have)continue;
    const u=UNITS[uid];const s=spr(u?.simg);
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:7px;align-items:center;background:rgba(0,0,0,.3);padding:6px;border:1px solid var(--gold3);border-radius:4px;margin-bottom:4px;';
    row.innerHTML=`
      ${s?`<img src="${s}" width="22" height="22" style="image-rendering:pixelated;">`:'<span>⚔</span>'}
      <div style="flex:1;font-size:12px;"><b style="color:var(--gold2);">${u?.name||uid}</b>
      <div style="color:#a09060;">${have} в замке · ⚔${u?.atk}</div></div>
      <input type="number" class="ac" data-uid="${uid}" value="0" min="0" max="${have}"
        style="width:50px;padding:4px;background:#0a1a0a;border:2px solid var(--gold);color:#70ff70;border-radius:4px;font-family:inherit;font-size:12px;text-align:center;outline:none;">
      <button class="mbtn gray aal" data-uid="${uid}" style="padding:4px 7px;font-size:11px;min-width:auto;">Все</button>`;
    list.appendChild(row);
  }
  con.appendChild(list);
  const bg=modal({title:'⚔ Подготовка похода',body:con,actions:[
    {label:'Отправить',kind:'red',handler:async()=>{
      const cnt=Object.values(sel).reduce((a,b)=>a+b,0);
      if(!cnt){toast('Выберите войска','err');return;}
      try{await api('/api/attack',{method:'POST',body:{targetCol:target.col,targetRow:target.row,units:sel,battleType}});
        toast(battleType==='raid'?'Набег отправлен!':battleType==='assault'?'Штурм начат!':'Войско отправлено!','ok');await refreshState();}
      catch(e){toast(e.message,'err');}
    },close:true},
  ]});
  bg.querySelector('.mfoot .mbtn.red')?.classList.add('atkgo');
  refresh();
  if(isPlayer){
    bg.querySelectorAll('.btype').forEach(btn=>{
      btn.onclick=()=>{
        battleType=btn.dataset.t;
        bg.querySelectorAll('.btype').forEach(b=>b.style.outline='');
        btn.style.outline='2px solid var(--gold)';
        refresh();
      };
    });
    // По умолчанию выделяем "нападение"
    const defBtn=bg.querySelector('.btype[data-t="attack"]');
    if(defBtn){defBtn.style.outline='2px solid var(--gold)';}
  }
  bg.querySelectorAll('.ac').forEach(inp=>{
    inp.oninput=()=>{const uid=inp.dataset.uid;sel[uid]=Math.max(0,Math.min(S.player.army[uid]||0,parseInt(inp.value)||0));inp.value=sel[uid];refresh();};
  });
  bg.querySelectorAll('.aal').forEach(btn=>{
    btn.onclick=()=>{const uid=btn.dataset.uid;const inp=bg.querySelector(`.ac[data-uid="${uid}"]`);inp.value=S.player.army[uid]||0;inp.dispatchEvent(new Event('input'));};
  });
}

function renderBattleReport(report) {
  if (!report) return '';
  const winColor = report.win ? '#5cff7a' : '#ff8080';
  const winText = report.win ? '🏆 ПОБЕДА' : '💀 ПОРАЖЕНИЕ';
  let html = `<div style="background:rgba(0,0,0,.4);border:1px solid ${winColor};border-radius:6px;padding:10px;margin-top:8px;">
    <div style="font-size:14px;font-weight:bold;color:${winColor};text-align:center;margin-bottom:8px;">${winText}</div>
    <div style="font-size:11px;color:#c0a080;margin-bottom:6px;">
      ⚔ ${escH(report.attacker?.username||'?')} [${report.attacker?.race||'?'}]
      vs 🛡 ${escH(report.defender?.username||'?')} [${report.defender?.race||'?'}]
    </div>`;
  // Таблица потерь атакующего
  const atkUnits = report.attackerUnits || {};
  const defUnits = report.defenderUnits || {};
  if (Object.keys(atkUnits).length) {
    html += `<div style="font-size:11px;color:var(--gold2);margin-bottom:3px;">Потери атакующего:</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">`;
    for (const [uid, d] of Object.entries(atkUnits)) {
      if (!d.sent) continue;
      const u = UNITS[uid];
      html += `<span style="font-size:10px;background:rgba(255,80,80,.2);border:1px solid #804040;border-radius:3px;padding:2px 5px;">
        ${u?.name||uid}: ${d.sent}→потерь ${d.lost}
      </span>`;
    }
    html += `</div>`;
  }
  // Добыча
  const loot = report.loot || {};
  const lootEntries = Object.entries(loot).filter(([,v])=>v>0);
  if (lootEntries.length) {
    html += `<div style="font-size:11px;color:#5cff7a;">Добыча: ${lootEntries.map(([k,v])=>`${RES_L[k]||k}+${v}`).join(', ')}</div>`;
  }
  // Разрушенные здания
  if (report.destroyed && report.destroyed.length) {
    html += `<div style="font-size:11px;color:#ff9060;margin-top:4px;">🔥 Разрушено: ${report.destroyed.join(', ')}</div>`;
  }
  if (report.generalXP > 0) {
    html += `<div style="font-size:11px;color:#f0c958;margin-top:4px;">⭐ Опыт генерала: +${report.generalXP}</div>`;
  }
  html += '</div>';
  return html;
}

const RATING_WEIGHTS_CLIENT = {
  castle:10,barracks:6,stables:6,smithy:5,university:8,
  magscool:7,magtower:7,market:5,treasury:6,temple:4,
  storage:3,workshop:4,guard_tower:4,alchimia:5,beer:3,
  secret:3,diplomat:5,resident:5,expedition:4,commerce:6,
  wisdom:3,gendel:4,spycentr:5,portal:15,traveler:8,arhcamp:6,
  wall:8,trap:5,prison:4,watchtower:6,magicschool:7,
  farm_small:2,sawmill_small:2,stone_small:2,iron_small:2,house_small:2,
};
function clientRating(p){
  let pts=0;
  for(const c of [...(p.castle||[]),...(p.lands||[])]){
    if(!c.bldId||!c.level)continue;
    const w=RATING_WEIGHTS_CLIENT[c.bldId]||1;
    for(let lv=1;lv<=c.level;lv++) pts+=Math.round(w*lv*1.5);
  }
  for(const uid in (p.army||{})) pts+=Math.floor((p.army[uid]||0)*0.5);
  pts+=Object.keys(p.techs||{}).length*20;
  return pts;
}
function ratingDeltaClient(bldId,toLvl){
  return Math.round((RATING_WEIGHTS_CLIENT[bldId]||1)*toLvl*1.5);
}
function ratingTitle(pts){
  if(pts>=5000) return {t:'👑 Великий Король',c:'#f0c958'};
  if(pts>=2000) return {t:'⚔ Повелитель',c:'#c8a0ff'};
  if(pts>=800)  return {t:'🛡 Рыцарь',c:'#80c8ff'};
  if(pts>=300)  return {t:'🏹 Воин',c:'#80ff80'};
  if(pts>=100)  return {t:'🌱 Новичок',c:'#c8d890'};
  return {t:'🥚 Поселенец',c:'#a8a890'};
}

    if(file.size>2*1024*1024){toast('Файл слишком большой (макс 2МБ)','err');return;}
    const reader=new FileReader();
    reader.onload=async ev=>{
      // Сжимаем через Canvas
      const img=new Image();
      img.onload=async()=>{
        const canvas=document.createElement('canvas');
        const size=120;canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        // Вписываем в квадрат
        const scale=Math.max(size/img.width,size/img.height);
        const sw=img.width*scale,sh=img.height*scale;
        ctx.drawImage(img,(size-sw)/2,(size-sh)/2,sw,sh);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        await saveAvatar({photo:compressed});
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  // Удаление фото
  const removeBtn=con.querySelector('#remove-photo');
  if(removeBtn) removeBtn.onclick=async()=>saveAvatar({photo:null});

// ── AUTH EMBERS ─────────────────────────────────────────
(function(){
  const cv=document.getElementById('auth-embers');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let W,H,embers=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mkEmber(){
    return{
      x:Math.random()*W,y:H+4,
      vx:(Math.random()-.5)*0.6,vy:-(0.4+Math.random()*0.7),
      r:1+Math.random()*2.5,life:1,decay:.004+Math.random()*.006,
      hue:20+Math.random()*30
    };
  }
  let frame=0;
  function tick(){
    requestAnimationFrame(tick);
    ctx.clearRect(0,0,W,H);
    frame++;
    if(frame%3===0&&embers.length<60)embers.push(mkEmber());
    embers=embers.filter(e=>e.life>0);
    for(const e of embers){
      e.x+=e.vx;e.y+=e.vy;e.vx+=(.5-Math.random())*.04;e.life-=e.decay;
      const alpha=e.life*.55;
      const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*2);
      g.addColorStop(0,`hsla(${e.hue},100%,80%,${alpha})`);
      g.addColorStop(1,`hsla(${e.hue},80%,50%,0)`);
      ctx.beginPath();ctx.arc(e.x,e.y,e.r*2,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }
  }
  tick();
})();

function setLoc(loc){
  LOC=loc;selectedWorldHex=null;selectedGridHex=null;
  if(loc==='world'&&S?.player?.worldPos){
    const R=33,W=R*2,H=Math.round(R*Math.sqrt(3));
    const {col,row}=S.player.worldPos;
    const hx=col*(W*0.75),hy=row*H+(col%2)*(H/2);
    const mw=$('#main').clientWidth||window.innerWidth;
    const mh=$('#main').clientHeight||window.innerHeight;
    const gridW=WORLD_COLS*(R*1.5)+R*0.5,gridH=WORLD_ROWS*H+H*0.5;
    vpX=mw/2-(mw-gridW)/2-hx-R;
    vpY=mh/2-(mh-gridH)/2-hy-H/2;
  }else{vpX=0;vpY=0;}
  const main=$('#main');
  if(main){main.className=loc==='world'?'loc-world':'';}
  renderMap();
  $$('.rn-btn[data-loc]').forEach(x=>x.classList.toggle('active',x.dataset.loc===loc));
  if(loc==='world')updateWorldCoords();
}

function jumpToCoords(col,row){
  col=Math.max(0,Math.min(WORLD_COLS-1,+col||0));
  row=Math.max(0,Math.min(WORLD_ROWS-1,+row||0));
  const R=33,W=R*2,H=Math.round(R*Math.sqrt(3));
  const hx=col*(W*0.75),hy=row*H+(col%2)*(H/2);
  const gridW=WORLD_COLS*(R*1.5)+R*0.5,gridH=WORLD_ROWS*H+H*0.5;
  const mw=$('#main').clientWidth||window.innerWidth;
  const mh=$('#main').clientHeight||window.innerHeight;
  vpX=mw/2-(mw-gridW)/2-hx-R;
  vpY=mh/2-(mh-gridH)/2-hy-H/2;
  renderMap();
}

function updateWorldCoords(){
  if(LOC!=='world')return;
  const el=$('#world-coords');if(!el)return;
  // Вычисляем центральную клетку
  const mw=$('#main').clientWidth||window.innerWidth;
  const mh=$('#main').clientHeight||window.innerHeight;
  const R=33,W=R*2,H=Math.round(R*Math.sqrt(3));
  const gridW=20*(R*1.5)+R*0.5,gridH=20*H+H*0.5;
  const ox=(mw-gridW)/2+vpX;
  const oy=(mh-gridH)/2+vpY;
  const cx=(mw/2-ox-R)/(W*0.75);
  const cy=(mh/2-oy-H/2)/H;
  const col=Math.round(cx),row=Math.round(cy);
  el.textContent=`X: ${Math.max(0,col)}  Y: ${Math.max(0,row)}`;
}
